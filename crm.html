  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: 'Inter', sans-serif; }
  .yt-modal { position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:1000; }
  .yt-modal iframe { width:min(90vw,900px);height:min(50vw,500px);border:none;border-radius:12px; }
  .prog-card:hover { transform:translateY(-3px);transition:transform 0.2s; }
  .exo-card:hover { transform:translateY(-2px);transition:transform 0.2s;cursor:pointer; }
  #crm-sidebar { transition:left 0.25s; }
  #crm-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:199; }
  .crm-hamburger { display:none;position:fixed;top:14px;left:14px;z-index:300;background:#122033;border:1px solid rgba(255,255,255,0.12);border-radius:10px;width:42px;height:42px;cursor:pointer;color:#f0f4f8;font-size:22px;line-height:1;align-items:center;justify-content:center; }
  @media (max-width: 767px) {
    .crm-hamburger { display:flex; }
    #crm-sidebar { position:fixed!important;left:-240px;top:0;bottom:0;z-index:200;width:230px!important;min-height:100vh; }
    #crm-sidebar.mob-open { left:0!important; }
    #crm-overlay.mob-open { display:block!important; }
    #crm-main { padding:16px!important;padding-top:60px!important;overflow-x:hidden; }

    /* Grid stats 2 colonnes */
    #crm-main div[style*="repeat(4,1fr)"] { grid-template-columns:repeat(2,1fr)!important; }

    /* Tables: scroll interne uniquement */
    #crm-main table { display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;max-width:100%; }
    #crm-main th, #crm-main td { white-space:nowrap; }

    /* Prevent full-page horizontal scroll */
    body { overflow-x:hidden; }

    /* ── FormBuilder: layout mobile ─────────── */
    /* Panneaux empiles verticalement */
    div:has(> [style*="width: 220px"]) { flex-direction:column!important; overflow-y:auto!important; }
    /* Panneau gauche: strip horizontal scrollable */
    [style*="width: 220px"] {
      width:100%!important; max-height:108px!important;
      flex-direction:row!important; border-right:none!important;
      border-bottom:1px solid rgba(255,255,255,0.07)!important;
      overflow-x:auto!important; overflow-y:hidden!important; flex-shrink:0!important;
    }
    [style*="width: 220px"] > div:first-child {
      display:flex!important; flex-direction:row!important;
      min-width:max-content!important; padding:6px!important; gap:4px!important;
    }
    /* Chaque question: chip compact icon+numero */
    [style*="width: 220px"] > div:first-child > div {
      min-width:50px!important; max-width:50px!important; flex-direction:column!important;
      align-items:center!important; padding:6px 4px!important; margin-bottom:0!important;
    }
    [style*="width: 220px"] > div:first-child > div > span:first-child { display:none!important; }
    [style*="width: 220px"] > div:first-child > div > div { display:none!important; }
    /* Cacher bouton Ajouter dans la sidebar */
    [style*="width: 220px"] > div:last-child { display:none!important; }
    /* Panneau droit: padding compact */
    div:has(> [style*="width: 220px"]) > div:last-child { padding:14px 12px!important; }
    /* Barre du haut: wrap + compact */
    div:has(> div:has(> [style*="width: 220px"])) > div:first-child {
      flex-wrap:wrap!important; gap:6px!important; padding:8px!important;
    }
    div:has(> div:has(> [style*="width: 220px"])) > div:first-child input {
      max-width:180px!important; font-size:12px!important;
    }
    div:has(> div:has(> [style*="width: 220px"])) > div:first-child > div[style*="flex: 1"] {
      display:none!important;
    }
  }

      function BarChart({rows, color}) {
        if (!rows || rows.length === 0) return h('p', {style:{color:C.muted,fontSize:13}}, 'Aucune donnée');
        const maxVal = Math.max(...rows.map(r => r.clicks||0), 1);
        return h('div', {style:{display:'flex',alignItems:'flex-end',gap:3,height:80,marginTop:8}},
          ...rows.map((r,i) => {
            const pct = ((r.clicks||0)/maxVal)*100;
            const label = (r.keys?.[0]||'').slice(5);
            return h('div', {key:i, style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}},
              h('div', {title:(r.keys?.[0]||'')+': '+(r.clicks||0)+' clics', style:{width:'100%',background:color,borderRadius:'3px 3px 0 0',height:pct+'%',minHeight:2}}),
              h('div', {style:{fontSize:9,color:C.muted,writingMode:'vertical-rl',transform:'rotate(180deg)',height:24,overflow:'hidden'}}, label)
            );
          })
        );
      }

      if (loading) return h('div', {style:{color:C.muted,padding:40}}, 'Chargement...');
      const totClicks = (gsc?.byDate||[]).reduce((s,r)=>s+(r.clicks||0),0);
      const totImpr   = (gsc?.byDate||[]).reduce((s,r)=>s+(r.impressions||0),0);

    // ── Clients Azeoo ─────────────────────────────────────────────────────────
    function ClientsAzeoo() {
      const ADMIN = ['fumeysarah@yahoo.fr','contact@sergepaulmier.com','contact@tayafitness.com'];
      const [clients,setClients] = useState([]);
      const [groupes,setGroupes] = useState([]);
      const [programmes,setProgrammes] = useState([]);
      const [plans,setPlans] = useState([]);
      const [loading,setLoading] = useState(true);
      const [search,setSearch] = useState('');
      const [filterStatut,setFilterStatut] = useState('');
      const [filterGroupe,setFilterGroupe] = useState('');
      const [isAdmin,setIsAdmin] = useState(false);
      const [msg,setMsg] = useState('');
      const [saving,setSaving] = useState(false);
      const [page,setPage] = useState(1);
      const PER_PAGE = 20;

      // Views: null=list, 'new'=create, client=detail, 'groups'=groups modal
      const [view,setView] = useState(null);
      const [selectedClient,setSelectedClient] = useState(null);
      const [showGroupsModal,setShowGroupsModal] = useState(false);
      const [showAssignProg,setShowAssignProg] = useState(false);
      const [showAssignPlan,setShowAssignPlan] = useState(false);
      const [clientNotes,setClientNotes] = useState([]);
      const [newNote,setNewNote] = useState('');
      const [newGroupName,setNewGroupName] = useState('');
      const [newGroupColor,setNewGroupColor] = useState('#e8c547');

      const EMPTY_CLIENT = {prenom:'',nom:'',email:'',telephone:'',genre:'',objectif:'',niveau:'',groupes:[],statut:'actif',note_interne:'',app:'',plan_nom:'',programme_id:''};
      const [cForm,setCForm] = useState(EMPTY_CLIENT);

      const goalColors = {'Lose Weight':C.blue,'Build Muscle':C.green,'Sculpt Your Body':C.gold,'Get Fit':C.purple};
      const niveauColors = {Advanced:C.green,Intermediate:C.gold,Beginner:C.blue};

      function loadData(){
        setLoading(true);
        Promise.all([
          sb.from('clients').select('*').order('created_at',{ascending:false}),
          sb.from('client_groupes').select('*').order('nom'),
          sb.from('programmes').select('id,titre').order('titre'),
          sb.from('subscription_plans').select('id,name,price,billing_cycle').order('price')
        ]).then(([{data:cl},{data:gr},{data:pr},{data:pl}])=>{
          setClients(cl||[]);setGroupes(gr||[]);setProgrammes(pr||[]);setPlans(pl||[]);setLoading(false);
        });
      }

      useEffect(()=>{
        sb.auth.getSession().then(({data:{session}})=>{if(session?.user)setIsAdmin(ADMIN.includes(session.user.email));});
        loadData();
      },[]);

      const filtered = clients.filter(c=>{
        const s=search.toLowerCase();
        const fullName=`${c.prenom||''} ${c.nom||''}`.toLowerCase();
        return(!s||fullName.includes(s)||(c.email||'').toLowerCase().includes(s)||(c.telephone||'').includes(s))
          &&(!filterStatut||c.statut===filterStatut)
          &&(!filterGroupe||(c.groupes||[]).includes(filterGroupe));
      });
      const totalPages=Math.ceil(filtered.length/PER_PAGE)||1;
      const paginated=filtered.slice((page-1)*PER_PAGE,page*PER_PAGE);

      function initials(c){
        const p=(c.prenom||'').trim();const n=(c.nom||'').trim();
        return((p[0]||'')+(n[0]||'')).toUpperCase()||'?';
      }
      function fullName(c){return `${c.prenom||''} ${c.nom||''}`.trim()||c.email||'—';}

      function openNew(){setCForm({...EMPTY_CLIENT});setView('new');setMsg('');}
      function openEdit(c){setCForm({...EMPTY_CLIENT,...c,groupes:c.groupes||[]});setView('edit');setSelectedClient(c);setMsg('');}
      function openDetail(c){setSelectedClient(c);setView('detail');loadNotes(c.id);setMsg('');}

      async function loadNotes(clientId){
        const{data}=await sb.from('notes').select('*').eq('client_id',clientId).order('created_at',{ascending:false});
        setClientNotes(data||[]);
      }

      async function saveClient(){
        if(!cForm.email&&!cForm.nom){setMsg('❌ Email ou nom requis');return;}
        setSaving(true);
        const body={prenom:cForm.prenom||null,nom:cForm.nom||null,email:cForm.email||null,telephone:cForm.telephone||null,genre:cForm.genre||null,objectif:cForm.objectif||null,niveau:cForm.niveau||null,groupes:cForm.groupes||[],statut:cForm.statut||'actif',note_interne:cForm.note_interne||null,app:cForm.app||null,plan_nom:cForm.plan_nom||null,programme_id:cForm.programme_id||null,updated_at:new Date().toISOString()};
        if(view==='edit'&&selectedClient){
          const{error}=await sb.from('clients').update(body).eq('id',selectedClient.id);
          if(error){setMsg('❌ '+error.message);}else{setMsg('✅ Client mis à jour');loadData();setTimeout(()=>{setView(null);setSelectedClient(null);},800);}
        } else {
          const{error}=await sb.from('clients').insert({...body,type:'particulier',source:'crm'});
          if(error){setMsg('❌ '+error.message);}else{setMsg('✅ Client ajouté');loadData();setTimeout(()=>setView(null),800);}
        }
        setSaving(false);
      }

      async function deleteClient(id){
        if(!confirm('Supprimer ce client ?'))return;
        await sb.from('clients').delete().eq('id',id);
        setView(null);setSelectedClient(null);loadData();
      }

      async function updateClientField(id,field,value){
        await sb.from('clients').update({[field]:value,updated_at:new Date().toISOString()}).eq('id',id);
        setClients(prev=>prev.map(c=>c.id===id?{...c,[field]:value}:c));
        if(selectedClient?.id===id)setSelectedClient(prev=>({...prev,[field]:value}));
      }

      async function toggleGroupe(clientId,grpNom){
        const client=clients.find(c=>c.id===clientId);
        if(!client)return;
        const grps=client.groupes||[];
        const newGrps=grps.includes(grpNom)?grps.filter(g=>g!==grpNom):[...grps,grpNom];
        await updateClientField(clientId,'groupes',newGrps);
      }

      async function addNote(){
        if(!newNote.trim()||!selectedClient)return;
        const{data}=await sb.from('notes').insert({client_id:selectedClient.id,contenu:newNote.trim(),type:'note'}).select().single();
        if(data){setClientNotes(prev=>[data,...prev]);setNewNote('');}
      }

      async function deleteNote(id){
        await sb.from('notes').delete().eq('id',id);
        setClientNotes(prev=>prev.filter(n=>n.id!==id));
      }

      async function addGroupe(){
        if(!newGroupName.trim())return;
        const{data,error}=await sb.from('client_groupes').insert({nom:newGroupName.trim(),couleur:newGroupColor}).select().single();
        if(!error&&data){setGroupes(prev=>[...prev,data]);setNewGroupName('');}
        else if(error)setMsg('❌ '+error.message);
      }

      async function deleteGroupe(id){
        await sb.from('client_groupes').delete().eq('id',id);
        setGroupes(prev=>prev.filter(g=>g.id!==id));

      useEffect(()=>{

      },[]);

      function openNewProg(){setPForm({...EP});setProgEditorView('new');setMsg('');}

      async function saveProg(){
        if(!pForm.titre.trim()){setMsg('❌ Le titre est obligatoire');return;}
        setSaving(true);
        const isEdit=progEditorView&&progEditorView!=='new';
        const body={
          titre:pForm.titre.trim(),
          description:pForm.description||null,
          description_courte:pForm.description_courte||null,
          image_url:pForm.image_url||null,
          prix:parseFloat(pForm.prix)||0,
          prix_promo:pForm.prix_promo?parseFloat(pForm.prix_promo):null,
          objectif:pForm.objectif||null,
          niveau:pForm.niveau||'debutant',
          duree_semaines:parseInt(pForm.duree_semaines)||8,
          duree_unite:pForm.duree_unite||'semaines',
          sexe:pForm.sexe||'tous',
          actif:!!pForm.actif,
          equipement:pForm.equipement||null,
          mensuration:!!pForm.mensuration,
          note:pForm.note||null,
          categorie:pForm.categorie||null,
          phase_precedente_id:pForm.phase_precedente_id||null,
          monetisation_paiement:!!pForm.monetisation_paiement,
          monetisation_credits:!!pForm.monetisation_credits,
          monetisation_groupes:!!pForm.monetisation_groupes,
          updated_at:new Date().toISOString()
        };
        if(isEdit){
          const slug=pForm.titre.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
          const {data,error}=await sb.from('programmes').update({...body,slug}).eq('id',progEditorView.id).select().single();
          if(!error&&data){setProgs(p=>p.map(x=>x.id===data.id?data:x));if(selectedProg?.id===data.id)setSelectedProg(data);setMsg('✅ Programme mis à jour');setTimeout(()=>setProgEditorView(null),1200);}
          else setMsg('❌ '+(error?.message||'Erreur'));
        } else {
          const slug=pForm.titre.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
          const {data,error}=await sb.from('programmes').insert({...body,slug}).select().single();
          if(!error&&data){setProgs(p=>[...p,data]);setMsg('✅ Programme créé');setTimeout(()=>setProgEditorView(null),1200);}
          else setMsg('❌ '+(error?.message||'Erreur'));
        }
        setSaving(false);
      }

      async function handleDeleteProg(){
        setSaving(true);
        const {error}=await sb.from('programmes').delete().eq('id',delProg.id);
        if(!error){setProgs(p=>p.filter(x=>x.id!==delProg.id));if(selectedProg?.id===delProg.id)setSelectedProg(null);setDelProg(null);setMsg('✅ Supprimé');setProgEditorView(null);}
        else setMsg('❌ '+(error?.message||'Erreur'));
        setSaving(false);setTimeout(()=>setMsg(''),4000);
      }
      async function handleTogglePublish(prog,e){
        if(e)e.stopPropagation();
        const newActif=!prog.actif;
        const {data,error}=await sb.from('programmes').update({actif:newActif}).eq('id',prog.id).select().single();
        if(!error&&data){setProgs(p=>p.map(x=>x.id===data.id?data:x));if(selectedProg?.id===data.id)setSelectedProg(data);setMsg(newActif?'✅ Programme publié 🌐':'✅ Dépublié');}
        else setMsg('❌ '+(error?.message||'Erreur'));
        setTimeout(()=>setMsg(''),4000);
      }
      async function loadProgData(id){
        setLoadingExos(true);
        const [{data:exData},{data:wData}]=await Promise.all([
          sb.from('programme_exercises').select('*,exercise:exercises(id,name,youtube_id,image_filename,tags)').eq('programme_id',id).order('week_number').order('day_number').order('order_index'),
          sb.from('programme_workouts').select('*').eq('programme_id',id).order('week_number').order('day_number')
        ]);
        setProgExos(exData||[]);setWorkouts(wData||[]);setLoadingExos(false);
      }
      function handleSelectProg(p){setSelectedProg(p);setSelectedDay(null);loadProgData(p.id);setMsg('');}

      function calcStats(week,day){
        const exos=progExos.filter(e=>(e.week_number||1)===week&&(e.day_number||1)===day);
        const totalSets=exos.reduce((s,e)=>s+(e.sets||0),0);
        const durationSec=exos.reduce((s,e)=>s+(e.sets||0)*((parseInt(e.reps)||10)*3+(e.rest_seconds||60)),0);
        return{totalSets,totalExos:exos.length,durationMin:Math.round(durationSec/60),energy:Math.round(totalSets*9.8)};
      }
      async function saveWorkoutName(week,day,name){
        setSaving(true);
        const existing=workouts.find(w=>w.week_number===week&&w.day_number===day);
        if(existing){const{data,error}=await sb.from('programme_workouts').update({name}).eq('id',existing.id).select().single();if(!error&&data)setWorkouts(prev=>prev.map(w=>w.id===data.id?data:w));}
        else{const{data,error}=await sb.from('programme_workouts').insert({programme_id:selectedProg.id,week_number:week,day_number:day,name}).select().single();if(!error&&data)setWorkouts(prev=>[...prev,data]);}
        setSaving(false);setEditWorkoutName(null);
      }
      async function deleteWorkoutDay(week,day){
        if(!confirm(`Supprimer la séance Sem.${week}/Jour${day} ?`))return;
        setSaving(true);
        const ids=progExos.filter(e=>e.week_number===week&&e.day_number===day).map(e=>e.id);
        if(ids.length)await sb.from('programme_exercises').delete().in('id',ids);
        const wo=workouts.find(w=>w.week_number===week&&w.day_number===day);
        if(wo)await sb.from('programme_workouts').delete().eq('id',wo.id);
        setProgExos(prev=>prev.filter(e=>!(e.week_number===week&&e.day_number===day)));
        setWorkouts(prev=>prev.filter(w=>!(w.week_number===week&&w.day_number===day)));
        setSelectedDay(null);setSaving(false);
      }
      async function openAddExo(week,day){
        if(!allExos.length){const{data}=await sb.from('exercises').select('id,name,tags,image_filename,youtube_id').order('name').limit(2000);setAllExos(data||[]);}
        const wdExos=progExos.filter(e=>(e.week_number||1)===week&&(e.day_number||1)===day);
        setAddExoOpen(true);setExoSearch('');
        setAForm({exercise_id:'',week_number:week,day_number:day,order_index:wdExos.length+1,sets:3,reps:12,rest_seconds:60,charge:'',notes:''});
      }
      async function handleAddExo(){
        if(!aForm.exercise_id){setMsg('❌ Sélectionnez un exercice');return;}
        setSaving(true);
        const{data,error}=await sb.from('programme_exercises').insert({...aForm,programme_id:selectedProg.id}).select('*,exercise:exercises(id,name,youtube_id,image_filename,tags)').single();
        if(!error&&data){setProgExos(prev=>[...prev,data].sort((a,b)=>(a.week_number-b.week_number)||((a.day_number||0)-(b.day_number||0))||(a.order_index-b.order_index)));setAddExoOpen(false);setMsg('✅ Exercice ajouté');}

        setSaving(false);setTimeout(()=>setMsg(''),4000);

        const{data,error}=await sb.from('programme_exercises')
          .update({sets:editExoForm.sets,reps:editExoForm.reps,rest_seconds:editExoForm.rest_seconds,charge:editExoForm.charge,notes:editExoForm.notes})

          && (!mtype || tags.includes(mtype));

      const totalPages = Math.ceil(filtered.length / PER_PAGE);
      const visible = filtered.slice(page*PER_PAGE, (page+1)*PER_PAGE);
      const resetPage = () => setPage(0);

      async function handleAdd() {
        setSaving(true);
        const tags = form.tags.split(',').map(t=>t.trim()).filter(Boolean);
        const {data,error} = await sb.from('exercises')
          .insert({name:form.name, youtube_id:form.youtube_id||null, tags})
          .select().single();
        if (!error && data) {
          setExos(prev => [...prev,data].sort((a,b)=>a.name.localeCompare(b.name)));
          setAddOpen(false); setForm({name:'',youtube_id:'',tags:''});
          setMsg('✅ Exercice ajouté');
        } else setMsg('❌ Erreur: '+(error?.message||''));
        setSaving(false); setTimeout(()=>setMsg(''),4000);
      }

      async function handleEdit() {
        setSaving(true);
        const {error} = await sb.from('exercises')
          .update({name:editExo.name, youtube_id:editExo.youtube_id||null})
          .eq('id',editExo.id);
        if (!error) {
          setExos(prev => prev.map(e => e.id===editExo.id ? {...e,...editExo} : e));
          setEditExo(null); setMsg('✅ Exercice mis à jour');
        } else setMsg('❌ Erreur: '+(error?.message||''));
        setSaving(false); setTimeout(()=>setMsg(''),4000);
      }

      async function handleDelete(exo) {
        const {error} = await sb.from('exercises').delete().eq('id',exo.id);
        if (!error) { setExos(prev=>prev.filter(e=>e.id!==exo.id)); setMsg('🗑️ Exercice supprimé'); }
        else setMsg('❌ Erreur: '+(error?.message||''));
        setDelExo(null); setTimeout(()=>setMsg(''),4000);
      }

      const modalBg = {position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000};
      const modalBox = {background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:32,width:480,maxWidth:'90vw'};
      const fldLabel = {fontSize:11,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:C.gold,marginBottom:6,marginTop:16};

            h('iframe', {src:`https://www.youtube.com/embed/${ytModal.youtube_id}?autoplay=1`, allow:'autoplay; encrypted-media', allowFullScreen:true}),

        // Add modal
        addOpen && h('div', {style:modalBg, onClick:()=>setAddOpen(false)},
          h('div', {style:modalBox, onClick:e=>e.stopPropagation()},
            h('h2', {style:{fontSize:18,fontWeight:700,color:C.white,marginBottom:4}}, 'Ajouter un exercice'),
            h('p', {style:{color:C.muted,fontSize:13,marginBottom:8}}, 'Entrez le nom et l\'URL YouTube (optionnel)'),
            h('div', {style:fldLabel}, 'Nom de l\'exercice *'),
            h('input', {style:inp, placeholder:'Ex: Goblet Squat', value:form.name, onChange:e=>setForm(f=>({...f,name:e.target.value}))}),
            h('div', {style:fldLabel}, 'YouTube ID ou URL'),
            h('input', {style:inp, placeholder:'Ex: dGKl7_bK5X4 ou https://youtube.com/watch?v=...', value:form.youtube_id,
              onChange:e=>{
                let v = e.target.value.trim();
                const m = v.match(/(?:v=|youtu\.be\/)([^&\s]{11})/);
                if (m) v = m[1];
                setForm(f=>({...f,youtube_id:v}));
              }
            }),
            h('div', {style:fldLabel}, 'Tags (virgule séparés)'),
            h('input', {style:inp, placeholder:'Ex: Bodyweight, Glutes, Quads, No equipment', value:form.tags, onChange:e=>setForm(f=>({...f,tags:e.target.value}))}),
            h('div', {style:{display:'flex',gap:12,marginTop:24}},
              h('button', {onClick:()=>setAddOpen(false), style:{...btn,background:'transparent',color:C.muted,border:`1px solid ${C.border}`,flex:1}}, 'Annuler'),
              h('button', {onClick:handleAdd, disabled:!form.name||saving, style:{...btn,flex:1,opacity:(!form.name||saving)?0.5:1}}, saving?'Enregistrement...':'Ajouter')
            )
          )
        ),

        // Edit modal
        editExo && h('div', {style:modalBg, onClick:()=>setEditExo(null)},
          h('div', {style:modalBox, onClick:e=>e.stopPropagation()},
            h('h2', {style:{fontSize:18,fontWeight:700,color:C.white,marginBottom:4}}, 'Modifier l\'exercice'),
            h('div', {style:fldLabel}, 'Nom'),
            h('input', {style:inp, value:editExo.name, onChange:e=>setEditExo(x=>({...x,name:e.target.value}))}),
            h('div', {style:fldLabel}, 'YouTube ID (remplacer la vidéo)'),
            h('input', {style:inp, placeholder:'ID YouTube (ex: dGKl7_bK5X4)', value:editExo.youtube_id||'',
              onChange:e=>{
                let v = e.target.value.trim();
                const m = v.match(/(?:v=|youtu\.be\/)([^&\s]{11})/);
                if (m) v = m[1];
                setEditExo(x=>({...x,youtube_id:v||null}));
              }
            }),
            editExo.youtube_id && h('a', {href:`https://www.youtube.com/watch?v=${editExo.youtube_id}`,target:'_blank',style:{display:'block',marginTop:8,color:C.blue,fontSize:12}}, `▶ Voir: youtube.com/watch?v=${editExo.youtube_id}`),
            h('div', {style:{display:'flex',gap:12,marginTop:24}},
              h('button', {onClick:()=>setEditExo(null), style:{...btn,background:'transparent',color:C.muted,border:`1px solid ${C.border}`,flex:1}}, 'Annuler'),
              h('button', {onClick:handleEdit, disabled:saving, style:{...btn,flex:1,opacity:saving?0.5:1}}, saving?'Enregistrement...':'Enregistrer')
            )
          )
        ),

        // Delete confirm
        delExo && h('div', {style:modalBg, onClick:()=>setDelExo(null)},
          h('div', {style:{...modalBox,maxWidth:380}, onClick:e=>e.stopPropagation()},
            h('h2', {style:{fontSize:18,fontWeight:700,color:C.red,marginBottom:12}}, 'Supprimer l\'exercice ?'),
            h('p', {style:{color:C.white,marginBottom:8}}, `"${delExo.name}"`),
            h('p', {style:{color:C.muted,fontSize:13,marginBottom:24}}, 'Cette action est irréversible.'),
            h('div', {style:{display:'flex',gap:12}},
              h('button', {onClick:()=>setDelExo(null), style:{...btn,background:'transparent',color:C.muted,border:`1px solid ${C.border}`,flex:1}}, 'Annuler'),
              h('button', {onClick:()=>handleDelete(delExo), style:{...btn,background:C.red,flex:1}}, 'Supprimer')
            )
          )
        ),

        // Header
        h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}},
          h('div', null,
            h('h1', {style:{fontSize:24,fontWeight:700,color:C.white}}, 'Bibliothèque d\'Exercices'),
            h('p', {style:{color:C.muted,fontSize:14,marginTop:4}},
              loading ? 'Chargement...' : `${filtered.length} exercice(s) · ${exos.length} au total · Supabase`)
          ),
          h('div', {style:{display:'flex',gap:10}},
            isAdmin && h('button', {onClick:()=>setAddOpen(true), style:{...btn,fontSize:13,padding:'10px 18px'}}, '+ Ajouter un exercice'),

          )
        ),

        // Flash message
        msg && h('div', {style:{background:'rgba(255,255,255,0.07)',border:`1px solid ${C.border}`,borderRadius:10,padding:'10px 16px',marginBottom:16,fontSize:13,color:C.white}}, msg),

        // Filters
        h('div', {style:{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}},
          h('input', {style:{...inp,width:280}, placeholder:'🔍 Rechercher un exercice...', value:search, onChange:e=>{setSearch(e.target.value);resetPage();}}),
          h('select', {style:{...inp,width:180}, value:muscle, onChange:e=>{setMuscle(e.target.value);resetPage();}},
            h('option', {value:''}, 'Tous les muscles'),
            ...EX_MUSCLES.map(m => h('option', {key:m,value:m}, m))
          ),
          h('select', {style:{...inp,width:180}, value:mtype, onChange:e=>{setMtype(e.target.value);resetPage();}},
            h('option', {value:''}, 'Tous les types'),
            ...EX_TYPES.map(t => h('option', {key:t,value:t}, t))
          )
        ),

        // Pagination bar
        h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
          h('p', {style:{color:C.muted,fontSize:13}}, `${visible.length} affichés sur ${filtered.length} · Page ${page+1}/${totalPages||1}`),
          h('div', {style:{display:'flex',gap:8}},
            h('button', {disabled:page===0, onClick:()=>setPage(p=>p-1), style:{background:'transparent',color:page===0?C.border:C.muted,border:`1px solid ${page===0?C.border:C.muted}`,borderRadius:8,padding:'6px 14px',cursor:page===0?'default':'pointer',fontSize:13}}, '← Préc'),
            h('button', {disabled:page>=totalPages-1, onClick:()=>setPage(p=>p+1), style:{background:'transparent',color:page>=totalPages-1?C.border:C.muted,border:`1px solid ${page>=totalPages-1?C.border:C.muted}`,borderRadius:8,padding:'6px 14px',cursor:page>=totalPages-1?'default':'pointer',fontSize:13}}, 'Suiv →')
          )
        ),

        // Cards grid
        loading ? h('p', {style:{color:C.muted}}, 'Chargement des exercices...') :
        h('div', {style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:16}},
          ...visible.map((exo) => {
            const thumb = imgUrl(exo.image_filename);
            const tags = exo.tags || [];
            const muscleTags = tags.filter(t => EX_MUSCLES.includes(t)).slice(0,2);
            const typeTags = tags.filter(t => EX_TYPES.includes(t)).slice(0,1);
            return h('div', {key:exo.id, className:'exo-card',
              style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:'hidden',transition:'transform 0.2s',position:'relative'},
              onClick:()=>exo.youtube_id && setYtModal(exo)},
              // Admin buttons
              isAdmin && h('div', {style:{position:'absolute',top:8,right:8,zIndex:10,display:'flex',gap:4}, onClick:e=>e.stopPropagation()},
                h('button', {onClick:()=>setEditExo(exo), title:'Modifier',
                  style:{background:'rgba(0,0,0,0.7)',color:C.white,border:'none',borderRadius:6,padding:'4px 7px',cursor:'pointer',fontSize:12}}, '✏️'),
                h('button', {onClick:()=>setDelExo(exo), title:'Supprimer',
                  style:{background:'rgba(255,0,0,0.7)',color:C.white,border:'none',borderRadius:6,padding:'4px 7px',cursor:'pointer',fontSize:12}}, '🗑')
              ),
              h('div', {style:{position:'relative',paddingBottom:'60%',background:C.soft}},
                thumb && h('img', {src:thumb, alt:exo.name, style:{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover'}, onError:e=>{e.target.style.display='none'}}),
                exo.youtube_id && h('div', {style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.3)'}},
                  h('div', {style:{width:44,height:44,background:'rgba(255,0,0,0.9)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}},
                    h('span', {style:{marginLeft:3}}, '▶')
                  )
                ),
                !exo.youtube_id && h('a', {href:`https://www.youtube.com/results?search_query=AZEOO+${encodeURIComponent(exo.name)}`,target:'_blank',
                  onClick:e=>e.stopPropagation(),
                  style:{position:'absolute',bottom:8,right:8,background:'rgba(255,0,0,0.85)',color:'#fff',borderRadius:6,padding:'4px 8px',fontSize:10,textDecoration:'none',fontWeight:600}}, 'YT ↗')
              ),
              h('div', {style:{padding:12}},
                h('div', {style:{fontSize:12,fontWeight:600,color:C.white,marginBottom:8,lineHeight:1.3}}, exo.name),
                h('div', {style:{display:'flex',gap:4,flexWrap:'wrap'}},
                  ...typeTags.map(t => h('span', {key:t,style:badge(typeColors[t]||C.muted)}, t)),
                  ...muscleTags.map(m => h('span', {key:m,style:badge(C.muted)}, m))
                )
              )
            );
          })
        )
      );
    }

    // ── Abonnements ──────────────────────────────────────────────────────────
    function Abonnements() {
      const [tab,setTab]=useState('abos');
      const [abos,setAbos]=useState([]);
      const [subPlans,setSubPlans]=useState([]);
      const [clients,setClients]=useState([]);
      const [filter,setFilter]=useState('all');
      const [loading,setLoading]=useState(true);
      const [planEditorView,setPlanEditorView]=useState(null); // null=list, 'new'=new, obj=edit
      const [showAboModal,setShowAboModal]=useState(false);
      const [aboForm,setAboForm]=useState({user_id:'',plan:'',statut:'active',current_period_start:'',current_period_end:''});
      const [saving,setSaving]=useState(false);
      const [msg,setMsg]=useState('');
      const EMPTY_PLAN={name:'',price:'',price_promo:'',billing_cycle:'monthly',annual_price:'',plan_type:'subscription',coaching_modes:[],sessions_count:'',duration_months:'',description:'',features:'',color:'#e8c547',is_best_seller:false,is_public:true,image_url:'',trial_days:'0',auto_renewal:true,end_of_commitment:'continue',client_groups:'',includes_app:false,includes_nutrition:false,includes_recipes:false,referral_enabled:false,referral_discount:'',referral_credit:''};
      const [planForm,setPlanForm]=useState(EMPTY_PLAN);

      function loadData(){
        setLoading(true);
        Promise.all([
          sb.from('abonnements').select('*,profiles(full_name,email)').order('created_at',{ascending:false}),
          sb.from('subscription_plans').select('*').order('price'),
          sb.from('profiles').select('id,full_name,email').order('full_name')
        ]).then(([{data:a},{data:p},{data:cl}])=>{
          setAbos(a||[]);setSubPlans(p||[]);setClients(cl||[]);setLoading(false);
        });
      }
      useEffect(()=>{loadData();},[]);

      const filtered=abos.filter(a=>filter==='all'||a.statut===filter);
      const counts={all:abos.length,active:abos.filter(a=>a.statut==='active').length,cancelled:abos.filter(a=>a.statut==='cancelled').length,past_due:abos.filter(a=>a.statut==='past_due').length};

      const MODES=[['en_salle','🏋️ En salle'],['a_domicile','🏠 À domicile'],['en_ligne','💻 En ligne']];
      const toggleMode=m=>{const ms=planForm.coaching_modes||[];setPlanForm(p=>({...p,coaching_modes:ms.includes(m)?ms.filter(x=>x!==m):[...ms,m]}));};

      function openNewPlan(){setPlanForm({...EMPTY_PLAN});setPlanEditorView('new');setMsg('');}
      function openEditPlan(pl){
        setPlanForm({...pl,
          features:(pl.features||[]).join('\n'),
          price:String(pl.price||''),
          price_promo:String(pl.price_promo||''),
          annual_price:String(pl.annual_price||''),
          sessions_count:String(pl.sessions_count||''),
          duration_months:String(pl.duration_months||''),
          trial_days:String(pl.trial_days||'0'),
          referral_discount:String(pl.referral_discount||''),
          referral_credit:String(pl.referral_credit||''),
          client_groups:(pl.client_groups||[]).join(', '),
          coaching_modes:pl.coaching_modes||[]
        });
        setPlanEditorView(pl);setMsg('');
      }

      async function savePlan(){
        if(!planForm.name.trim())return;
        setSaving(true);
        const body={
          name:planForm.name.trim(),
          description:planForm.description||null,
          price:parseFloat(planForm.price)||0,
          price_promo:planForm.price_promo?parseFloat(planForm.price_promo):null,
          billing_cycle:planForm.billing_cycle,
          annual_price:planForm.annual_price?parseFloat(planForm.annual_price):null,
          plan_type:planForm.plan_type||'subscription',
          coaching_modes:planForm.coaching_modes||[],
          sessions_count:planForm.sessions_count?parseInt(planForm.sessions_count):null,
          duration_months:planForm.duration_months?parseInt(planForm.duration_months):null,
          features:planForm.features.split('\n').map(s=>s.trim()).filter(Boolean),
          color:planForm.color,
          is_best_seller:!!planForm.is_best_seller,
          is_public:!!planForm.is_public,
          image_url:planForm.image_url||null,
          trial_days:parseInt(planForm.trial_days)||0,
          auto_renewal:!!planForm.auto_renewal,
          end_of_commitment:planForm.end_of_commitment||'continue',
          client_groups:planForm.client_groups?planForm.client_groups.split(',').map(s=>s.trim()).filter(Boolean):[],
          includes_app:!!planForm.includes_app,
          includes_nutrition:!!planForm.includes_nutrition,
          includes_recipes:!!planForm.includes_recipes,
          referral_enabled:!!planForm.referral_enabled,
          referral_discount:planForm.referral_discount?parseFloat(planForm.referral_discount):0,
          referral_credit:planForm.referral_credit?parseFloat(planForm.referral_credit):0,
          updated_at:new Date().toISOString()
        };
        const isEdit=planEditorView&&planEditorView!=='new';
        if(isEdit){
          const{error}=await sb.from('subscription_plans').update(body).eq('id',planEditorView.id);
          if(error){setMsg('❌ '+error.message);}else{setMsg('✅ Formule mise à jour');loadData();setTimeout(()=>setPlanEditorView(null),1200);}
        } else {
          const{error}=await sb.from('subscription_plans').insert(body);
          if(error){setMsg('❌ '+error.message);}else{setMsg('✅ Formule créée');loadData();setTimeout(()=>setPlanEditorView(null),1200);}
        }
        setSaving(false);
      }

      async function deletePlan(id){
        if(!confirm('Supprimer cette formule ?'))return;
        await sb.from('subscription_plans').delete().eq('id',id);
        setPlanEditorView(null);loadData();
      }

      async function saveAbo(){
        if(!aboForm.user_id||!aboForm.plan)return;
        setSaving(true);
        const{error}=await sb.from('abonnements').insert({user_id:aboForm.user_id,plan:aboForm.plan,statut:aboForm.statut,current_period_start:aboForm.current_period_start||new Date().toISOString(),current_period_end:aboForm.current_period_end||null});
        if(error){setMsg('❌ '+error.message);}
        else{setMsg('✅ Abonnement créé');setShowAboModal(false);}
        setSaving(false);loadData();
      }

      async function updateAboStatus(id,statut){
        await sb.from('abonnements').update({statut,updated_at:new Date().toISOString()}).eq('id',id);
        loadData();
      }

      const CYCLE_LABEL={monthly:'/mois',yearly:'/an'};
      const planColorMap={};subPlans.forEach(p=>{planColorMap[p.name]=p.color||C.gold;});

      // ── Section helper ────────────────────────────────────────────────────
      const Section=(title,children)=>h('div',{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:22,marginBottom:16}},
        h('div',{style:{fontSize:12,fontWeight:700,color:C.white,marginBottom:16,paddingBottom:10,borderBottom:`1px solid ${C.border}`}},title),
        ...children
      );

      // ── Plan editor (pleine page) ─────────────────────────────────────────
      if(planEditorView!==null){
        const isEdit=planEditorView&&planEditorView!=='new';
        const planSlug=(planForm.name||'').toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
        const directUrl=`https://taya-fitness.vercel.app/offres#${planSlug}`;
        return h('div',null,
          // Header
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}},
            h('div',{style:{display:'flex',alignItems:'center',gap:12}},
              h('button',{onClick:()=>setPlanEditorView(null),style:{background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:8,padding:'6px 12px',cursor:'pointer',fontSize:13}},'← Formules'),
              h('h1',{style:{fontSize:20,fontWeight:700,color:C.white,margin:0}},isEdit?planForm.name||'Modifier la formule':'Nouvelle formule')
            ),
            h('div',{style:{display:'flex',gap:10,alignItems:'center'}},
              isEdit&&h('button',{onClick:()=>deletePlan(planEditorView.id),style:{background:'rgba(224,85,85,0.12)',border:'none',color:'#e05555',borderRadius:10,padding:'10px 16px',cursor:'pointer',fontSize:13,fontWeight:600}},'Supprimer'),
              h('button',{onClick:savePlan,disabled:saving||!planForm.name.trim(),style:{...btn,opacity:saving||!planForm.name.trim()?0.5:1}},saving?'Enregistrement...':'💾 Enregistrer')
            )
          ),
          msg&&h('div',{style:{padding:'10px 14px',borderRadius:8,background:msg.startsWith('❌')?'rgba(224,85,85,0.15)':'rgba(74,222,128,0.15)',color:msg.startsWith('❌')?'#e05555':C.green,marginBottom:16,fontSize:13}},msg),

          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 340px',gap:16,alignItems:'start'}},

            // ── Colonne gauche
            h('div',null,

              // Section Identité
              Section('📋 Identité',[
                h('div',{style:{marginBottom:12}},
                  h('label',{style:{display:'block',fontSize:11,color:C.muted,marginBottom:4}},'Nom de la formule *'),
                  h('input',{value:planForm.name,onChange:e=>setPlanForm(p=>({...p,name:e.target.value})),placeholder:'ex: Programme PROGRESSION 3 mois',style:{...inp,width:'100%',fontSize:14,fontWeight:600}})
                ),
                h('div',null,
                  h('label',{style:{display:'block',fontSize:11,color:C.muted,marginBottom:4}},'Description (apparaît lors du paiement et sur le portail client)'),
                  h('textarea',{value:planForm.description||'',onChange:e=>setPlanForm(p=>({...p,description:e.target.value})),placeholder:'Décrivez ce que le client obtient avec cette formule...',style:{...inp,width:'100%',height:80,resize:'vertical'}})
                )
              ]),

              // Section Disponibilité
              Section('🔗 Disponibilité',[
                h('div',{style:{display:'flex',gap:8,marginBottom:14}},
                  ...[[true,'🌐 Public','Affiché lors du paiement pour tous les visiteurs'],[false,'🔒 Privé','Uniquement disponible par lien direct']].map(([v,label,sub])=>
                    h('div',{key:String(v),onClick:()=>setPlanForm(p=>({...p,is_public:v})),style:{flex:1,padding:'12px 14px',borderRadius:10,border:`1.5px solid ${planForm.is_public===v?C.gold:C.border}`,background:planForm.is_public===v?`${C.gold}11`:C.soft,cursor:'pointer'}},
                      h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:4}},
                        h('div',{style:{width:14,height:14,borderRadius:'50%',border:`2px solid ${planForm.is_public===v?C.gold:C.border}`,background:planForm.is_public===v?C.gold:'transparent',flexShrink:0}}),
                        h('span',{style:{fontSize:13,fontWeight:600,color:planForm.is_public===v?C.gold:C.white}},label)
                      ),
                      h('div',{style:{fontSize:11,color:C.muted,paddingLeft:22}},sub)
                    )
                  )
                ),
                h('div',{style:{display:'flex',alignItems:'center',gap:8,background:C.soft,borderRadius:8,padding:'8px 12px'}},
                  h('span',{style:{fontSize:11,color:C.muted,flexShrink:0}},'Lien direct :'),
                  h('span',{style:{fontSize:11,color:C.blue,wordBreak:'break-all'}},directUrl),
                  h('button',{onClick:()=>navigator.clipboard.writeText(directUrl),style:{background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:6,padding:'3px 8px',cursor:'pointer',fontSize:10,flexShrink:0}},'Copier')
                )
              ]),

              // Section Prix
              Section('💰 Prix',[
                h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:12}},
                  h('div',null,
                    h('label',{style:{display:'block',fontSize:11,color:C.muted,marginBottom:4}},'Prix TTC (€) *'),
                    h('input',{type:'number',value:planForm.price,onChange:e=>setPlanForm(p=>({...p,price:e.target.value})),placeholder:'99',style:{...inp,width:'100%',fontSize:16,fontWeight:700}})
                  ),
                  h('div',null,
                    h('label',{style:{display:'block',fontSize:11,color:C.muted,marginBottom:4}},'Prix promo TTC (€)'),
                    h('input',{type:'number',value:planForm.price_promo||'',onChange:e=>setPlanForm(p=>({...p,price_promo:e.target.value})),placeholder:'—',style:{...inp,width:'100%'}})
                  ),

    function RevBarChart({ data }) {
      if (!data || !data.length) return null;
      const max = Math.max(...data.map(d => d.amount), 1);
      const W = 640, H = 160, PAD = 28;
      const bw = Math.floor((W - PAD * 2) / data.length) - 4;
      return h('svg', { viewBox: `0 0 ${W} ${H + 26}`, style: { width: '100%', height: 'auto' } },
        ...data.map((d, i) => {
          const barH = Math.max(2, (d.amount / max) * H);
          const x = PAD + i * ((W - PAD * 2) / data.length) + 2;
          const y = H - barH;
          return h('g', { key: d.month },
            h('rect', { x, y, width: bw, height: barH, rx: 4, fill: i === data.length - 1 ? C.gold : C.blue, opacity: 0.82 }),
            h('text', { x: x + bw / 2, y: H + 16, textAnchor: 'middle', fontSize: 10, fill: C.muted }, d.month.slice(5)),
            d.amount > 0 ? h('text', { x: x + bw / 2, y: y - 4, textAnchor: 'middle', fontSize: 9, fill: C.white }, Math.round(d.amount / 100) + '€') : null
          );
        })
      );
    }

        // ── Tâches ───────────────────────────────────────────────────────────────
    function Taches() {
      const [taches,setTaches]=useState([]);
      const [titre,setTitre]=useState('');
      const [prio,setPrio]=useState('normale');
      useEffect(()=>{load();}, []);
      async function load(){const {data}=await sb.from('taches').select('*').order('created_at',{ascending:false});setTaches(data||[]);}
      async function add(e){e.preventDefault();if(!titre.trim())return;await sb.from('taches').insert({titre,statut:'todo',priorite:prio});setTitre('');load();}
      async function toggle(id,done){await sb.from('taches').update({statut:done?'todo':'done'}).eq('id',id);load();}
      async function del(id){await sb.from('taches').delete().eq('id',id);load();}
      const pc={haute:C.red,normale:C.gold,basse:C.blue};
      const todo=taches.filter(t=>t.statut!=='done');
      const done=taches.filter(t=>t.statut==='done');
      return h('div',null,
        h('h1',{style:{fontSize:24,fontWeight:700,marginBottom:24,color:C.white}},'Tâches'),
        h('div',{style:{...card,marginBottom:24}},
          h('form',{onSubmit:add,style:{display:'flex',gap:12}},
            h('input',{style:{...inp,flex:1},value:titre,onChange:e=>setTitre(e.target.value),placeholder:'Nouvelle tâche...'}),
            h('select',{style:{...inp,width:140},value:prio,onChange:e=>setPrio(e.target.value)},
              h('option',{value:'haute'},'🔴 Haute'),
              h('option',{value:'normale'},'🟡 Normale'),
              h('option',{value:'basse'},'🔵 Basse')
            ),
            h('button',{style:btn},'Ajouter')
          )
        ),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}},
          h('div',{style:card},
            h('h3',{style:{fontSize:15,fontWeight:600,marginBottom:16,color:C.white}},`À faire (${todo.length})`),
            todo.length===0?h('p',{style:{color:C.muted,fontSize:14}},'Tout est fait 🎉'):
            todo.map((t,i)=>h('div',{key:i,style:{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:`1px solid ${C.border}`}},
              h('button',{onClick:()=>toggle(t.id,false),style:{width:20,height:20,borderRadius:4,border:`2px solid ${C.border}`,background:'transparent',cursor:'pointer',flexShrink:0}}),
              h('span',{style:{flex:1,fontSize:14,color:C.white}},t.titre),
              h('span',{style:badge(pc[t.priorite]||C.muted)},t.priorite),
              h('button',{onClick:()=>del(t.id),style:{background:'transparent',border:'none',color:C.muted,cursor:'pointer',fontSize:16}},'✕')
            ))
          ),
          h('div',{style:card},
            h('h3',{style:{fontSize:15,fontWeight:600,marginBottom:16,color:C.white}},`Terminées (${done.length})`),
            done.length===0?h('p',{style:{color:C.muted,fontSize:14}},'Aucune tâche terminée.'):
            done.map((t,i)=>h('div',{key:i,style:{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:`1px solid ${C.border}`}},
              h('button',{onClick:()=>toggle(t.id,true),style:{width:20,height:20,borderRadius:4,border:'none',background:C.green,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#fff'}},'✓'),
              h('span',{style:{flex:1,fontSize:14,textDecoration:'line-through',color:C.muted}},t.titre),
              h('button',{onClick:()=>del(t.id),style:{background:'transparent',border:'none',color:C.muted,cursor:'pointer',fontSize:16}},'✕')
            ))
          )
        )
      );
    }


    // ── Form Preview Modal ────────────────────────────────────────────────────
    function FormPreviewModal({form,fmeta,questions,onClose}){
      const [step,setStep]=useState(0);
      const bg=fmeta.bg_color||'#0d1b2a';
      const accent=fmeta.accent_color||'#ff6b4a';
      const btnShape=fmeta.btn_shape||'pill';
      const btnRadius=btnShape==='sharp'?'0px':btnShape==='square'?'6px':btnShape==='rounded'?'14px':'50px';
      const btnBg=fmeta.btn_color||accent;
      const btnTextCol=fmeta.btn_text_color||'#000';
      const fontFam=fmeta.font_family?`'${fmeta.font_family}',sans-serif`:'Inter,sans-serif';
      const allSteps=[{_isHome:true},...(questions||[]),{type:'__end'}];
      const cur=allSteps[step]||allSteps[0];
      const answerableCount=(questions||[]).filter(q=>q.type!=='info_screen').length;
      const answerableSoFar=(questions||[]).slice(0,step).filter(q=>q.type!=='info_screen').length;
      const progress=step===0?0:Math.round((answerableSoFar/Math.max(answerableCount,1))*100);
      const ctaBtn={background:btnBg,color:btnTextCol,border:'none',borderRadius:btnRadius,padding:'14px 28px',fontSize:16,fontWeight:700,cursor:'pointer',fontFamily:'inherit',marginTop:16,display:'inline-block'};
      const iStyle={background:'transparent',border:'none',borderBottom:'2px solid rgba(255,255,255,0.2)',color:'rgba(255,255,255,0.8)',fontSize:16,width:'100%',padding:'8px 0',outline:'none',fontFamily:'inherit'};

      function renderInput(q){
        switch(q.type){
          case 'short_answer': return h('input',{style:iStyle,placeholder:'Votre réponse...',readOnly:true});
          case 'long_answer': return h('textarea',{style:{background:'rgba(255,255,255,0.04)',border:'1.5px solid rgba(255,255,255,0.12)',borderRadius:10,color:'rgba(255,255,255,0.8)',fontSize:15,width:'100%',padding:'12px',outline:'none',resize:'vertical',minHeight:80,fontFamily:'inherit'},placeholder:'Votre réponse...',readOnly:true});

            h('div',{style:{flex:1,padding:'14px',borderRadius:12,border:'2px solid rgba(255,77,106,0.3)',color:'#ff4d6a',textAlign:'center',fontWeight:600,fontSize:15}},'👎 Non')
          );

          case 'multiple_choice': return h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
            ...(q.options||[]).map((opt,i)=>h('div',{key:i,style:{padding:'12px 16px',border:'1.5px solid rgba(255,255,255,0.1)',borderRadius:10,fontSize:14,color:'rgba(255,255,255,0.7)',display:'flex',alignItems:'center',gap:10}},

            ))

      function renderContent(){

          h('div',{style:{fontSize:11,fontWeight:600,color:accent,letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:8}},'Question '+(step)+' / '+(questions||[]).length),
          h('h2',{style:{fontSize:20,fontWeight:700,marginBottom:8,lineHeight:1.3}},cur.title),
          cur.description&&h('p',{style:{color:'rgba(255,255,255,0.5)',fontSize:13,marginBottom:16,lineHeight:1.5,whiteSpace:'pre-line'}},cur.description),

      return h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:3000},onClick:e=>{if(e.target===e.currentTarget)onClose();}},
        h('div',{style:{position:'relative',width:'min(390px,90vw)',height:'min(750px,90vh)',borderRadius:20,overflow:'hidden',boxShadow:'0 30px 80px rgba(0,0,0,0.7)',border:'1px solid rgba(255,255,255,0.1)',background:bg,color:'#fff',fontFamily:fontFam,display:'flex',flexDirection:'column'}},

          ),

          h('div',{style:{position:'absolute',top:10,left:10,zIndex:20,background:'rgba(0,0,0,0.45)',borderRadius:6,padding:'3px 8px',fontSize:10,color:'rgba(255,255,255,0.4)',letterSpacing:'0.08em',backdropFilter:'blur(4px)'}},'APERÇU'),
          h('div',{style:{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:28}},renderContent()),
          step>0&&step<allSteps.length-1&&h('div',{style:{display:'flex',justifyContent:'flex-end',padding:'10px 16px',gap:8,borderTop:'1px solid rgba(255,255,255,0.07)',flexShrink:0}},
            step>1&&h('button',{onClick:()=>setStep(s=>s-1),style:{background:'rgba(255,255,255,0.08)',border:'none',color:'#aaa',borderRadius:'50%',width:36,height:36,cursor:'pointer',fontSize:15}},'↑'),
            h('button',{onClick:()=>setStep(s=>Math.min(s+1,allSteps.length-1)),style:{background:`linear-gradient(135deg,${accent},${accent}bb)`,border:'none',color:'#000',borderRadius:'50%',width:36,height:36,cursor:'pointer',fontSize:15,fontWeight:700}},'↓')
          )
        )
      );
    }

    // ── Questionnaires ────────────────────────────────────────────────────────
    function FormBuilder({form,initQuestions,onClose,baseUrl}){
      const [questions,setQuestions]=useState(initQuestions);
      const [deletedIds,setDeletedIds]=useState([]);
      const [selIdx,setSelIdx]=useState(0);
      const [title,setTitle]=useState(form.title);
      const [saving,setSaving]=useState(false);
      const [addOpen,setAddOpen]=useState(false);
      const [shareOpen,setShareOpen]=useState(false);
      const [previewOpen,setPreviewOpen]=useState(false);
      const [msg,setMsg]=useState('');
      const [settingsOpen,setSettingsOpen]=useState(false);
      const [dragIdx,setDragIdx]=useState(null);
      const [dragOverIdx,setDragOverIdx]=useState(null);
      const [fmeta,setFmeta]=useState({cover_url:form.cover_url||'',homepage_title:form.homepage_title||'',homepage_description:form.homepage_description||'',homepage_button:form.homepage_button||'Commencer',end_title:form.end_title||'Merci !',end_description:form.end_description||'Vos réponses ont bien été enregistrées.',end_button:form.end_button||'Terminer',bg_color:(form.settings&&form.settings.bg_color)||'#0d1b2a',accent_color:(form.settings&&form.settings.accent_color)||'#ff6b4a',font_family:(form.settings&&form.settings.font_family)||'Inter',cover_height:(form.settings&&form.settings.cover_height)||220,cover_position:(form.settings&&form.settings.cover_position)||'center center',cover_radius:(form.settings&&form.settings.cover_radius)||16,btn_shape:(form.settings&&form.settings.btn_shape)||'pill',btn_color:(form.settings&&form.settings.btn_color)||'',btn_text_color:(form.settings&&form.settings.btn_text_color)||'#000000',title_font_family:(form.settings&&form.settings.title_font_family)||'',font_weight:(form.settings&&form.settings.font_weight)||'400',title_font_weight:(form.settings&&form.settings.title_font_weight)||'700',font_italic:(form.settings&&form.settings.font_italic)||false,title_font_italic:(form.settings&&form.settings.title_font_italic)||false,text_color:(form.settings&&form.settings.text_color)||'#ffffff',title_color:(form.settings&&form.settings.title_color)||'#ffffff',desc_color:(form.settings&&form.settings.desc_color)||'rgba(255,255,255,0.65)'});
      const [plans,setPlans]=useState((form.settings&&form.settings.plans)||[]);
      const TYPES=[
        {v:'info_screen',l:"Page d'info",icon:'ℹ️'},
        {v:'multi_fields',l:'Multi-champs',icon:'📋'},
        {v:'short_answer',l:'Réponse courte',icon:'Aa'},
        {v:'long_answer',l:'Paragraphe',icon:'¶'},
        {v:'single_choice',l:'Choix unique',icon:'◎'},
        {v:'multiple_choice',l:'Choix multiple',icon:'☑'},
        {v:'yesno',l:'Oui / Non',icon:'👍'},
        {v:'rating',l:'Notation',icon:'⭐'},
        {v:'email',l:'Email',icon:'📧'},
        {v:'phone',l:'Téléphone',icon:'📞'},
        {v:'date',l:'Date',icon:'📅'},
      ];
      const FIELD_TYPES=[
        {v:'text',l:'Texte'},
        {v:'number',l:'Nombre'},
        {v:'email',l:'Email'},
        {v:'tel',l:'Téléphone'},
        {v:'date',l:'Date'},
        {v:'textarea',l:'Paragraphe'},
      ];
      const sel=questions[selIdx]||questions[0];
      const formUrl=`${baseUrl}/forms.html?slug=${form.slug}`;
      const embedCode=`<iframe src="${formUrl}" width="100%" height="600" frameborder="0" allowfullscreen></iframe>`;

      async function save(){
        setSaving(true);
        try{
          const{error:fe}=await sb.from('forms').update({title,cover_url:fmeta.cover_url||null,homepage_title:fmeta.homepage_title||null,homepage_description:fmeta.homepage_description||null,homepage_button:fmeta.homepage_button||'Commencer',end_title:fmeta.end_title||null,end_description:fmeta.end_description||null,end_button:fmeta.end_button||'Terminer',settings:{...(form.settings||{}),bg_color:fmeta.bg_color,accent_color:fmeta.accent_color,font_family:fmeta.font_family,cover_height:fmeta.cover_height,cover_position:fmeta.cover_position,cover_radius:fmeta.cover_radius,btn_shape:fmeta.btn_shape,btn_color:fmeta.btn_color,btn_text_color:fmeta.btn_text_color,title_font_family:fmeta.title_font_family,font_weight:fmeta.font_weight,title_font_weight:fmeta.title_font_weight,font_italic:fmeta.font_italic,title_font_italic:fmeta.title_font_italic,text_color:fmeta.text_color,title_color:fmeta.title_color,desc_color:fmeta.desc_color,plans:plans},updated_at:new Date().toISOString()}).eq('id',form.id);
          if(fe)throw new Error('Formulaire: '+fe.message);
          for(const did of deletedIds){await sb.from('form_questions').delete().eq('id',did);}
          setDeletedIds([]);
          const updated=[];
          for(let i=0;i<questions.length;i++){
            const q={...questions[i]};
            if(!q.id||String(q.id).startsWith('tmp-')){
              const body={form_id:form.id,order_index:i,type:q.type,title:q.title,description:q.description||null,required:q.required||false,options:q.options||null,settings:q.settings||{}};
              const{data:nq,error:ie}=await sb.from('form_questions').insert(body).select('*').single();
              if(ie)throw new Error(`Question "${q.title}": ${ie.message}`);
              updated.push(nq||{...q,id:'tmp-'+(i+Date.now())});
            } else {
              const{error:ue}=await sb.from('form_questions').update({order_index:i,type:q.type,title:q.title,description:q.description||null,required:q.required||false,options:q.options||null,settings:q.settings||{}}).eq('id',q.id);
              if(ue)throw new Error(`Question "${q.title}": ${ue.message}`);
              updated.push(q);
            }
          }
          setQuestions(updated);
          setMsg('✅ Sauvegardé !');setTimeout(()=>setMsg(''),3000);
        }catch(e){
          setMsg('❌ Erreur: '+e.message);setTimeout(()=>setMsg(''),6000);
        }finally{setSaving(false);}
      }

      function upd(ch){setQuestions(prev=>prev.map((q,i)=>i===selIdx?{...q,...ch}:q));}
      async function uploadMedia(file,cb){
        try{
          const ext=file.name.split('.').pop().toLowerCase();
          const path=`${form.id}/${Date.now()}.${ext}`;
          const{data,error}=await sb.storage.from('form-media').upload(path,file,{contentType:file.type,upsert:true});
          if(error)throw error;
          const{data:{publicUrl}}=sb.storage.from('form-media').getPublicUrl(path);
          cb(publicUrl);
          setMsg('✅ Média uploadé !');setTimeout(()=>setMsg(''),3000);
        }catch(e){setMsg('❌ Upload échoué: '+e.message);}
      }
      async function uploadCover(file){
        try{
          const ext=file.name.split('.').pop().toLowerCase();
          const path=`covers/${form.id}/${Date.now()}.${ext}`;
          const{data,error}=await sb.storage.from('form-media').upload(path,file,{contentType:file.type,upsert:true});
          if(error)throw error;
          const{data:{publicUrl}}=sb.storage.from('form-media').getPublicUrl(path);
          setFmeta(p=>({...p,cover_url:publicUrl}));
          setMsg('✅ Image uploadée !');setTimeout(()=>setMsg(''),3000);
        }catch(e){setMsg('❌ Upload échoué: '+e.message);}
      }

      function addQ(type){
        const isInfo=type==='info_screen';
        const isMF=type==='multi_fields';
        const hasOpts=['multiple_choice','single_choice'].includes(type);
        const defaultSettings=isMF?{fields:[{label:'Nom',type:'text'},{label:'Prénom',type:'text'},{label:'Âge',type:'number'},{label:'Email',type:'email'},{label:'Téléphone',type:'tel'}]}:{};
        const q={id:'tmp-'+Date.now(),type,title:isInfo?'Information':isMF?'Informations':'Nouvelle question',description:'',required:!isInfo,options:hasOpts?['Option 1','Option 2']:null,settings:defaultSettings};
        const nq=[...questions,q];setQuestions(nq);setSelIdx(nq.length-1);setAddOpen(false);
      }

      function delQ(idx){
        const q=questions[idx];
        if(q.id&&!String(q.id).startsWith('tmp-'))setDeletedIds(prev=>[...prev,q.id]);
        const nq=questions.filter((_,i)=>i!==idx);setQuestions(nq);setSelIdx(Math.min(idx,nq.length-1));
      }

      function move(idx,dir){
        if((dir<0&&idx===0)||(dir>0&&idx===questions.length-1))return;
        const nq=[...questions];[nq[idx+dir],nq[idx]]=[nq[idx],nq[idx+dir]];setQuestions(nq);setSelIdx(idx+dir);
      }

      return h('div',{style:{position:'fixed',inset:0,background:C.bg,zIndex:2000,display:'flex',flexDirection:'column',fontFamily:'Inter,sans-serif'}},
        h('div',{style:{background:C.card,borderBottom:`1px solid ${C.border}`,padding:'10px 16px',display:'flex',alignItems:'center',gap:12,flexShrink:0}},
          h('button',{onClick:onClose,style:{background:'transparent',border:'none',color:C.muted,cursor:'pointer',fontSize:20,lineHeight:1,padding:'0 8px'}},'←'),
          h('input',{value:title,onChange:e=>setTitle(e.target.value),style:{...inp,flex:1,maxWidth:380,fontSize:14,fontWeight:600,padding:'7px 12px'}}),
          h('div',{style:{flex:1}}),
          msg&&h('span',{style:{color:C.green,fontSize:13,marginRight:8}},msg),
          h('button',{onClick:()=>setShareOpen(true),style:{background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:8,padding:'7px 12px',cursor:'pointer',fontSize:12,flexShrink:0}},'🔗 Partager'),
          h('button',{onClick:()=>setSettingsOpen(true),style:{background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:8,padding:'7px 12px',cursor:'pointer',fontSize:12,flexShrink:0}},'⚙️ Paramètres'),
          h('button',{onClick:()=>setPreviewOpen(true),style:{background:'transparent',border:`1px solid ${C.blue}44`,color:C.blue,borderRadius:8,padding:'7px 12px',cursor:'pointer',fontSize:12,flexShrink:0}},'👁 Aperçu'),
          h('button',{onClick:save,disabled:saving,style:{...btn,padding:'8px 16px',fontSize:13,flexShrink:0}},saving?'Saving...':'💾 Sauvegarder')
        ),
        h('div',{style:{flex:1,display:'flex',overflow:'hidden'}},
          h('div',{style:{width:220,borderRight:`1px solid ${C.border}`,background:C.soft,display:'flex',flexDirection:'column',overflowY:'auto'}},
            h('div',{style:{padding:10,flex:1}},
              questions.map((q,idx)=>h('div',{
                key:q.id||idx,
                onClick:()=>setSelIdx(idx),
                draggable:true,
                onDragStart:e=>{setDragIdx(idx);e.dataTransfer.effectAllowed='move';},
                onDragOver:e=>{e.preventDefault();e.dataTransfer.dropEffect='move';setDragOverIdx(idx);},
                onDragLeave:()=>setDragOverIdx(null),
                onDrop:e=>{
                  e.preventDefault();
                  if(dragIdx===null||dragIdx===idx){setDragIdx(null);setDragOverIdx(null);return;}
                  const qs=[...questions];
                  const [moved]=qs.splice(dragIdx,1);
                  qs.splice(idx,0,moved);
                  setQuestions(qs);
                  setSelIdx(idx);
                  setDragIdx(null);
                  setDragOverIdx(null);
                },
                onDragEnd:()=>{setDragIdx(null);setDragOverIdx(null);},
                style:{padding:'9px 10px',marginBottom:4,borderRadius:8,cursor:'grab',background:dragOverIdx===idx?`${C.gold}33`:selIdx===idx?`${C.gold}22`:C.card,border:`1px solid ${dragOverIdx===idx?C.gold:selIdx===idx?C.gold:C.border}`,display:'flex',alignItems:'center',gap:8,opacity:dragIdx===idx?0.4:1,transition:'opacity 0.1s,background 0.1s'}
              },
                h('span',{style:{fontSize:12,color:C.muted,cursor:'grab',flexShrink:0}},'⠿'),
                h('span',{style:{fontSize:14}},TYPES.find(t=>t.v===q.type)?.icon||'📝'),
                h('div',{style:{flex:1,minWidth:0}},
                  h('div',{style:{fontSize:11,fontWeight:600,color:selIdx===idx?C.gold:C.white,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},(q.title||q.type).slice(0,22)),
                  h('div',{style:{fontSize:10,color:C.muted}},TYPES.find(t=>t.v===q.type)?.l||q.type)
                ),
                h('span',{style:{fontSize:10,color:C.muted,flexShrink:0}},idx+1)
              ))
            ),
            h('div',{style:{padding:10,borderTop:`1px solid ${C.border}`}},
              h('button',{onClick:()=>setAddOpen(true),style:{...btn,width:'100%',fontSize:13,padding:'8px 0'}},'+ Ajouter')
            )
          ),
          h('div',{style:{flex:1,overflowY:'auto',padding:'28px 36px'}},
            sel&&h('div',{style:{maxWidth:580,margin:'0 auto'}},
              h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
                h('span',{style:{fontSize:12,color:C.muted}},`Question ${selIdx+1} / ${questions.length}`),
                h('div',{style:{display:'flex',gap:6}},
                  h('button',{onClick:()=>move(selIdx,-1),disabled:selIdx===0,style:{background:'transparent',border:`1px solid ${C.border}`,color:selIdx===0?C.border:C.muted,borderRadius:6,padding:'4px 10px',cursor:selIdx===0?'default':'pointer',fontSize:12}},'↑'),
                  h('button',{onClick:()=>move(selIdx,1),disabled:selIdx===questions.length-1,style:{background:'transparent',border:`1px solid ${C.border}`,color:selIdx===questions.length-1?C.border:C.muted,borderRadius:6,padding:'4px 10px',cursor:selIdx===questions.length-1?'default':'pointer',fontSize:12}},'↓'),
                  questions.length>1&&h('button',{onClick:()=>delQ(selIdx),style:{background:'transparent',border:`1px solid ${C.red}44`,color:C.red,borderRadius:6,padding:'4px 10px',cursor:'pointer',fontSize:12}},'🗑 Supprimer')
                )
              ),
              h('div',{style:{...card,padding:24,marginBottom:20}},
                h('div',{style:{marginBottom:16}},
                  h('div',{style:{fontSize:11,fontWeight:700,letterSpacing:'0.15em',textTransform:'uppercase',color:C.gold,marginBottom:6}},'Type'),
                  h('select',{value:sel.type,onChange:e=>{const t=e.target.value;const hasOpts=['multiple_choice','single_choice'].includes(t);upd({type:t,options:hasOpts?['Option 1','Option 2']:null,required:t!=='info_screen'});},style:{...inp,width:'100%'}},
                    ...TYPES.map(t=>h('option',{key:t.v,value:t.v},t.icon+' '+t.l))
                  )
                ),
                h('div',{style:{marginBottom:16}},
                  h('div',{style:{fontSize:11,fontWeight:700,letterSpacing:'0.15em',textTransform:'uppercase',color:C.gold,marginBottom:6}},'Titre *'),
                  h('input',{value:sel.title||'',onChange:e=>upd({title:e.target.value}),style:{...inp,width:'100%'},placeholder:'Titre de la question'})
                ),
                h('div',{style:{marginBottom:16}},
                  h('div',{style:{fontSize:11,fontWeight:700,letterSpacing:'0.15em',textTransform:'uppercase',color:C.gold,marginBottom:6}},'Description'),
                  h('textarea',{value:sel.description||'',onChange:e=>upd({description:e.target.value}),style:{...inp,width:'100%',height:80,resize:'vertical'},placeholder:'Instructions, contexte...'})
                ),
                h('div',{style:{marginBottom:16,padding:'12px',background:C.bg,borderRadius:10,border:`1px solid ${C.border}`}},
                  h('div',{style:{fontSize:11,fontWeight:700,letterSpacing:'0.15em',textTransform:'uppercase',color:C.gold,marginBottom:8}},'🖼 Média (image / vidéo)'),
                  h('div',{style:{display:'flex',gap:6,marginBottom:8}},
                    h('input',{value:(sel.settings&&sel.settings.media_url)||'',onChange:e=>{const url=e.target.value;const mt=url.includes('youtube')||url.includes('youtu.be')?'youtube':url.match(/\.(mp4|webm|mov)$/i)?'video':'image';upd({settings:{...(sel.settings||{}),media_url:url,media_type:mt}});},style:{...inp,flex:1,fontSize:12},placeholder:'URL image, vidéo ou YouTube...'}),
                    h('label',{style:{...btn,padding:'8px 12px',fontSize:12,cursor:'pointer',flexShrink:0,display:'inline-flex',alignItems:'center',gap:4}},
                      '📁',

    function ResponsesView({form,onClose}){
      const [responses,setResponses]=useState([]);
      const [questions,setQuestions]=useState([]);
      const [loading,setLoading]=useState(true);
      const [selected,setSelected]=useState(null);
      useEffect(()=>{
        Promise.all([
          sb.from('form_responses').select('*').eq('form_id',form.id).order('completed_at',{ascending:false}),
          sb.from('form_questions').select('*').eq('form_id',form.id).order('order_index')
        ]).then(([{data:r},{data:q}])=>{
          setResponses(r||[]);
          setQuestions((q||[]).filter(q=>q.type!=='info_screen'));
          setLoading(false);
        });
      },[]);
      return h('div',null,
        h('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:24}},
          h('button',{onClick:onClose,style:{background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:8,padding:'7px 14px',cursor:'pointer'}},'← Retour'),
          h('h1',{style:{fontSize:20,fontWeight:700,color:C.white}},`Réponses — ${form.title}`),
          h('span',{style:{...badge(C.blue),marginLeft:'auto'}},`${responses.length} réponse${responses.length>1?'s':''}`)
        ),
        loading?h('p',{style:{color:C.muted}},'Chargement...'):
        responses.length===0?h('div',{style:{textAlign:'center',padding:'60px 20px',color:C.muted}},
          h('div',{style:{fontSize:48,marginBottom:12}},'📭'),
          h('p',null,'Aucune réponse pour ce questionnaire')
        ):
        h('div',{style:{display:'grid',gap:12}},
          ...responses.map(r=>h('div',{key:r.id,style:{...card,cursor:'pointer',border:`1px solid ${selected===r.id?C.gold:C.border}`},onClick:()=>setSelected(selected===r.id?null:r.id)},
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
              h('div',null,
                h('div',{style:{fontSize:14,fontWeight:600,color:C.white}},r.respondent_name||r.respondent_email||'Anonyme'),
                h('div',{style:{fontSize:12,color:C.muted}},new Date(r.completed_at).toLocaleString('fr-FR'))
              ),
              h('span',{style:{...badge(C.green),fontSize:11}},'✓ Complété')
            ),
            selected===r.id&&h('div',{style:{marginTop:16,borderTop:`1px solid ${C.border}`,paddingTop:16}},
              ...questions.map(q=>{
                const ans=r.answers?.[q.id];
                if(ans===undefined||ans===null||ans==='')return null;
                return h('div',{key:q.id,style:{marginBottom:14,paddingBottom:14,borderBottom:`1px solid ${C.border}`}},
                  h('div',{style:{fontSize:12,fontWeight:700,color:C.gold,marginBottom:4}},q.title),
                  h('div',{style:{fontSize:14,color:C.white}},Array.isArray(ans)?ans.join(', '):String(ans))
                );
              }).filter(Boolean)
            )
          ))
        )
      );
    }

    function Questionnaires(){
      const [isAdmin,setIsAdmin]=useState(false);
      const [forms,setForms]=useState([]);
      const [loading,setLoading]=useState(true);
      const [builder,setBuilder]=useState(null);
      const [responsesView,setResponsesView]=useState(null);
      const [delForm,setDelForm]=useState(null);
      const [msg,setMsg]=useState('');
      const BASE_URL='https://taya-fitness-site-1.vercel.app';

      useEffect(()=>{
        sb.auth.getSession().then(({data:{session}})=>{if(session?.user)setIsAdmin(ADMIN_EMAILS.includes(session.user.email));});
        load();
      },[]);

      async function load(){
        setLoading(true);
        const{data}=await sb.from('forms').select('*, form_questions(count), form_responses(count)').order('created_at',{ascending:false});
        setForms((data||[]).map(f=>({...f,_qCount:f.form_questions?.[0]?.count||0,_rCount:f.form_responses?.[0]?.count||0})));
        setLoading(false);
      }

      async function createForm(){
        const slug='form-'+Date.now();
        const{data}=await sb.from('forms').insert({title:'Nouveau questionnaire',slug}).select('*').single();
        if(data){
          await sb.from('form_questions').insert([
            {form_id:data.id,order_index:0,type:'info_screen',title:'Bienvenue !',description:'Remplissez ce questionnaire.',required:false},
            {form_id:data.id,order_index:1,type:'short_answer',title:'Votre nom complet',required:true}
          ]);
          await openBuilder(data);
        }
      }

      async function openBuilder(form){
        const{data:questions}=await sb.from('form_questions').select('*').eq('form_id',form.id).order('order_index');
        setBuilder({form,questions:questions||[]});
      }

      async function deleteForm(f){
        await sb.from('forms').delete().eq('id',f.id);
        setDelForm(null);load();
      }

      if(builder)return h(FormBuilder,{key:builder.form.id,form:builder.form,initQuestions:builder.questions,onClose:()=>{setBuilder(null);load();},baseUrl:BASE_URL});
      if(responsesView)return h(ResponsesView,{form:responsesView,onClose:()=>setResponsesView(null)});

      return h('div',null,
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}},
          h('div',null,
            h('h1',{style:{fontSize:24,fontWeight:700,color:C.white,marginBottom:4}},'📋 Questionnaires'),
            h('p',{style:{color:C.muted,fontSize:13}},'Formulaires Typeform — créez, partagez et collectez des réponses')
          ),
          isAdmin&&h('button',{onClick:createForm,style:btn},'+ Nouveau questionnaire')
        ),
        msg&&h('div',{style:{color:C.green,marginBottom:12,fontSize:13}},msg),
        loading?h('p',{style:{color:C.muted}},'Chargement...'):
        forms.length===0?h('div',{style:{textAlign:'center',padding:'60px 20px',color:C.muted}},
          h('div',{style:{fontSize:48,marginBottom:12}},'📋'),
          h('p',null,'Aucun questionnaire'),
          isAdmin&&h('button',{onClick:createForm,style:{...btn,marginTop:12}},'+ Créer le premier')
        ):
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:16}},

                ),
                h('div',{style:{background:C.soft,borderRadius:8,padding:'7px 10px',display:'flex',alignItems:'center',gap:6}},
                  h('span',{style:{fontSize:10,color:C.muted,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},`${BASE_URL}/forms.html?slug=${f.slug}`),

                )

              h('div',{style:{borderTop:`1px solid ${C.border}`,padding:'10px 12px',display:'flex',gap:6}},
