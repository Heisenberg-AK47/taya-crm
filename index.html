            sb.from('abonnements').select('*',{count:'exact',head:true}).eq('statut','active'),
            sb.from('newsletter').select('*',{count:'exact',head:true}),
            sb.from('abonnements').select('plan').eq('statut','active'),
            sb.from('profiles').select('full_name,email,created_at').order('created_at',{ascending:false}).limit(5),
          ]);

          const mrr=(ab||[]).reduce((s,a)=>s+(prix[a.plan]||0),0);

            )),
            h('tbody',null,...filtered.map((c,i)=>h('tr',{key:i,style:{background:i%2?'rgba(255,255,255,0.01)':'transparent'}},

              h('td',{style:{...td,color:C.muted,fontSize:12}},c.email),

              h('td',{style:td},c.objectif!=='—'?h('span',{style:badge(goalColors[c.objectif]||C.muted)},c.objectif):'—'),
              h('td',{style:td},c.niveau!=='—'?h('span',{style:badge(niveauColors[c.niveau]||C.muted)},c.niveau):'—')

    // ── Programmes ────────────────────────────────────────────────────────────
    function Programmes() {
      const [progs,setProgs] = useState([]);
      const [loading,setLoading] = useState(true);
      const [isAdmin,setIsAdmin] = useState(false);
      const [filter,setFilter] = useState('');
      const [msg,setMsg] = useState('');
      const [saving,setSaving] = useState(false);
      // Detail view
      const [selectedProg,setSelectedProg] = useState(null);
      const [selWeek,setSelWeek] = useState(1);
      const [progExos,setProgExos] = useState([]);
      const [loadingExos,setLoadingExos] = useState(false);
      // Workouts (séances nommées par jour)
      const [workouts,setWorkouts] = useState([]); // [{id,programme_id,week_number,day_number,name}]
      const [selectedDay,setSelectedDay] = useState(null); // {week,day} or null
      const [editWorkoutName,setEditWorkoutName] = useState(false);
      const [workoutNameDraft,setWorkoutNameDraft] = useState('');
      // Programme CRUD
      const EP = {titre:'',description:'',description_courte:'',image_url:'',prix:'',prix_promo:'',categorie:'musculation',niveau:'debutant',duree_heures:12,actif:true};
      const [createOpen,setCreateOpen] = useState(false);
      const [editProg,setEditProg] = useState(null);
      const [delProg,setDelProg] = useState(null);
      const [pForm,setPForm] = useState(EP);
      // Exercise CRUD
      const [addExoOpen,setAddExoOpen] = useState(false);
      const [allExos,setAllExos] = useState([]);
      const [exoSearch,setExoSearch] = useState('');
      const [aForm,setAForm] = useState({exercise_id:'',week_number:1,day_number:1,order_index:1,sets:3,reps:12,rest_seconds:60,charge:'',notes:''});

      const catColors = {musculation:C.green,'perte-de-poids':C.blue,'post-partum':C.purple,'force':C.gold};
      const catLabels = {musculation:'Musculation','perte-de-poids':'Perte de poids','post-partum':'Post-Partum','force':'Force'};
      const niveauLabels = {debutant:'Débutant',intermediaire:'Intermédiaire',avance:'Avancé'};
      const filtExos = useMemo(()=>allExos.filter(e=>!exoSearch||e.name.toLowerCase().includes(exoSearch.toLowerCase())),[allExos,exoSearch]);

      useEffect(()=>{
        sb.auth.getSession().then(({data:{session}})=>{if(session?.user)setIsAdmin(ADMIN_EMAILS.includes(session.user.email));});
        sb.from('programmes').select('*').order('created_at').then(({data})=>{setProgs(data||[]);setLoading(false);});
      },[]);

      // ── Programme CRUD ──
      async function handleCreate() {
        setSaving(true);
        const slug = pForm.titre.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
        const {data,error} = await sb.from('programmes')
          .insert({...pForm,slug,prix:parseFloat(pForm.prix)||0,prix_promo:pForm.prix_promo?parseFloat(pForm.prix_promo):null,duree_heures:parseInt(pForm.duree_heures)||0})
          .select().single();
        if (!error&&data){setProgs(p=>[...p,data]);setCreateOpen(false);setPForm(EP);setMsg('✅ Programme créé');}
        else setMsg('❌ '+(error?.message||'Erreur'));
        setSaving(false);setTimeout(()=>setMsg(''),4000);
      }
      async function handleEditProg() {
        setSaving(true);
        const {data,error} = await sb.from('programmes')
          .update({...editProg,prix:parseFloat(editProg.prix)||0,prix_promo:editProg.prix_promo?parseFloat(editProg.prix_promo):null,duree_heures:parseInt(editProg.duree_heures)||0})
          .eq('id',editProg.id).select().single();
        if (!error&&data){setProgs(p=>p.map(x=>x.id===data.id?data:x));if(selectedProg?.id===data.id)setSelectedProg(data);setEditProg(null);setMsg('✅ Programme mis à jour');}
        else setMsg('❌ '+(error?.message||'Erreur'));
        setSaving(false);setTimeout(()=>setMsg(''),4000);
      }
      async function handleDeleteProg() {
        setSaving(true);
        const {error} = await sb.from('programmes').delete().eq('id',delProg.id);
        if (!error){setProgs(p=>p.filter(x=>x.id!==delProg.id));if(selectedProg?.id===delProg.id)setSelectedProg(null);setDelProg(null);setMsg('✅ Supprimé');}
        else setMsg('❌ '+(error?.message||'Erreur'));
        setSaving(false);setTimeout(()=>setMsg(''),4000);
      }
      async function handleTogglePublish(prog,e) {
        e.stopPropagation();
        const newActif = !prog.actif;
        const {data,error} = await sb.from('programmes').update({actif:newActif}).eq('id',prog.id).select().single();
        if (!error&&data){
          setProgs(p=>p.map(x=>x.id===data.id?data:x));
          if(selectedProg?.id===data.id)setSelectedProg(data);
          setMsg(newActif?'✅ Programme publié sur le site 🌐':'✅ Programme dépublié du site');
        } else setMsg('❌ '+(error?.message||'Erreur'));
        setTimeout(()=>setMsg(''),4000);
      }

      // ── Exercise & Workout CRUD ──
      async function loadProgData(id){
        setLoadingExos(true);
        const [{data:exData},{data:wData}] = await Promise.all([
          sb.from('programme_exercises').select('*, exercise:exercises(id,name,youtube_id,image_filename,tags)')
            .eq('programme_id',id).order('week_number').order('day_number').order('order_index'),
          sb.from('programme_workouts').select('*').eq('programme_id',id).order('week_number').order('day_number')
        ]);
        setProgExos(exData||[]);
        setWorkouts(wData||[]);
        setLoadingExos(false);
      }
      function handleSelectProg(p){setSelectedProg(p);setSelWeek(1);setSelectedDay(null);loadProgData(p.id);setMsg('');}

      // Créer ou mettre à jour le nom d'une séance
      async function saveWorkoutName(week,day,name){
        setSaving(true);
        const existing = workouts.find(w=>w.week_number===week&&w.day_number===day);
        if(existing){
          const{data,error}=await sb.from('programme_workouts').update({name}).eq('id',existing.id).select().single();
          if(!error&&data) setWorkouts(prev=>prev.map(w=>w.id===data.id?data:w));
          else setMsg('❌ '+(error?.message||'Erreur'));
        } else {
          const{data,error}=await sb.from('programme_workouts').insert({programme_id:selectedProg.id,week_number:week,day_number:day,name}).select().single();
          if(!error&&data) setWorkouts(prev=>[...prev,data]);
          else setMsg('❌ '+(error?.message||'Erreur'));
        }
        setSaving(false);setEditWorkoutName(false);setTimeout(()=>setMsg(''),4000);
      }

      // Supprimer tous les exos d'un jour
      async function deleteWorkoutDay(week,day){
        if(!confirm(`Supprimer toute la séance Semaine ${week} / Séance ${day} ?`))return;
        setSaving(true);
        const ids=progExos.filter(e=>e.week_number===week&&e.day_number===day).map(e=>e.id);
        if(ids.length) await sb.from('programme_exercises').delete().in('id',ids);
        const wo=workouts.find(w=>w.week_number===week&&w.day_number===day);
        if(wo) await sb.from('programme_workouts').delete().eq('id',wo.id);
        setProgExos(prev=>prev.filter(e=>!(e.week_number===week&&e.day_number===day)));
        setWorkouts(prev=>prev.filter(w=>!(w.week_number===week&&w.day_number===day)));
        setSelectedDay(null);setSaving(false);
      }

      async function openAddExo(wk,dk){
        const w = wk!==undefined?wk:selWeek;
        const d = dk!==undefined?dk:(selectedDay?.day||1);
        if(!allExos.length){const{data}=await sb.from('exercises').select('id,name,tags').order('name').limit(2000);setAllExos(data||[]);}
        const wdExos=progExos.filter(e=>(e.week_number||1)===w&&(e.day_number||1)===d);
        setAddExoOpen(true);setExoSearch('');
        setAForm({exercise_id:'',week_number:w,day_number:d,order_index:wdExos.length+1,sets:3,reps:12,rest_seconds:60,charge:'',notes:''});
      }
      async function handleAddExo(){
        if(!aForm.exercise_id){setMsg('❌ Sélectionnez un exercice');return;}
        setSaving(true);
        const{data,error}=await sb.from('programme_exercises')
          .insert({...aForm,programme_id:selectedProg.id})
          .select('*, exercise:exercises(id,name,youtube_id,image_filename,tags)').single();
        if(!error&&data){
          setProgExos(prev=>[...prev,data].sort((a,b)=>(a.week_number-b.week_number)||((a.day_number||0)-(b.day_number||0))||(a.order_index-b.order_index)));
          setSelWeek(aForm.week_number);
          setSelectedDay({week:aForm.week_number,day:aForm.day_number});
          setAddExoOpen(false);setMsg('✅ Exercice ajouté');
        }else setMsg('❌ '+(error?.message||'Erreur'));
        setSaving(false);setTimeout(()=>setMsg(''),4000);
      }
      async function handleRemoveExo(peId){
        if(!confirm('Retirer cet exercice du programme ?'))return;
        const{error}=await sb.from('programme_exercises').delete().eq('id',peId);
        if(!error)setProgExos(prev=>prev.filter(e=>e.id!==peId));
        else setMsg('❌ '+(error?.message||'Erreur'));
        setTimeout(()=>setMsg(''),4000);
      }

      // ── Shared prog form fields ──
      function pFields(data,set){
        const fi=(label,field,type='text',extra={})=>{
          const val=data[field]??'';
          const onChange=e=>set(p=>({...p,[field]:type==='number'?Number(e.target.value)||0:e.target.value}));
          if(type==='select')return h('div',{key:field,style:{marginBottom:10}},
            h('label',{style:{fontSize:10,color:C.muted,display:'block',marginBottom:3,textTransform:'uppercase',letterSpacing:'0.08em'}},label),
            h('select',{value:val,onChange,style:inp},...(extra.opts||[]).map(([v,l])=>h('option',{key:v,value:v},l))));
          if(type==='textarea')return h('div',{key:field,style:{marginBottom:10}},
            h('label',{style:{fontSize:10,color:C.muted,display:'block',marginBottom:3,textTransform:'uppercase',letterSpacing:'0.08em'}},label),
            h('textarea',{value:val,onChange,placeholder:extra.ph||'',style:{...inp,height:68,resize:'vertical'}}));
          return h('div',{key:field,style:{marginBottom:10}},
            h('label',{style:{fontSize:10,color:C.muted,display:'block',marginBottom:3,textTransform:'uppercase',letterSpacing:'0.08em'}},label),
            h('input',{type,value:val,onChange,placeholder:extra.ph||'',style:inp}));
        };
        return [
          fi('Titre','titre','text',{ph:'Ex: Transformation Corps & Mental'}),
          fi('Description courte','description_courte','text',{ph:'Résumé en une phrase'}),
          fi('Description complète','description','textarea',{ph:'Description du programme...'}),
          fi('URL image','image_url','text',{ph:'https://...'}),
          h('div',{key:'row1',style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:0}},
            fi('Prix (€)','prix','number',{ph:'99'}),
            fi('Prix promo (€)','prix_promo','number',{ph:'(optionnel)'})
          ),
          h('div',{key:'row2',style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:0}},
            fi('Catégorie','categorie','select',{opts:[['musculation','Musculation'],['perte-de-poids','Perte de poids'],['post-partum','Post-Partum'],['force','Force']]}),
            fi('Niveau','niveau','select',{opts:[['debutant','Débutant'],['intermediaire','Intermédiaire'],['avance','Avancé']]}),
            fi('Durée (h)','duree_heures','number',{ph:'12'})
          ),
        ];
      }

      // ── Modal helper ──
      const Modal=(children)=>h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.78)',display:'flex',alignItems:'flex-start',justifyContent:'center',zIndex:1000,padding:'32px 16px',overflowY:'auto'}},
        h('div',{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:28,width:'100%',maxWidth:540}},children));

      // ── Add Exercise Modal (shared) ──
      const AddExoModal=()=>h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.78)',display:'flex',alignItems:'flex-start',justifyContent:'center',zIndex:1000,padding:'32px 16px',overflowY:'auto'}},
        h('div',{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:28,width:'100%',maxWidth:560}},
          h('h3',{style:{color:C.white,fontSize:16,fontWeight:700,marginBottom:16}},`Ajouter un exercice — Sem. ${aForm.week_number} / Jour ${aForm.day_number}`),
          h('input',{placeholder:'Rechercher un exercice...',value:exoSearch,onChange:e=>setExoSearch(e.target.value),style:{...inp,marginBottom:8}}),
          h('div',{style:{maxHeight:180,overflowY:'auto',marginBottom:12,border:`1px solid ${C.border}`,borderRadius:10}},
            filtExos.length===0?h('div',{style:{padding:20,textAlign:'center',color:C.muted,fontSize:13}},'Aucun résultat')
            :filtExos.slice(0,60).map(e=>h('div',{key:e.id,onClick:()=>setAForm(f=>({...f,exercise_id:e.id})),
              style:{padding:'9px 14px',cursor:'pointer',fontSize:13,background:aForm.exercise_id===e.id?`${C.gold}22`:C.soft,color:aForm.exercise_id===e.id?C.gold:C.white,borderBottom:`1px solid ${C.border}`}},e.name))
          ),
          h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:8}},
            ...[['Semaine','week_number','number'],['Séance','day_number','number'],['Ordre','order_index','number']].map(([l,f,t])=>
              h('div',{key:f},h('label',{style:{fontSize:10,color:C.muted,display:'block',marginBottom:3}},l),
                h('input',{type:t,min:0,value:aForm[f],onChange:e=>setAForm(g=>({...g,[f]:parseInt(e.target.value)||0})),style:{...inp,padding:'8px 10px'}})))
          ),
          h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:10}},
            ...[['Séries','sets','number'],['Reps','reps','number'],['Repos s','rest_seconds','number'],['Charge','charge','text']].map(([l,f,t])=>
              h('div',{key:f},h('label',{style:{fontSize:10,color:C.muted,display:'block',marginBottom:3}},l),
                h('input',{type:t,min:t==='number'?0:undefined,value:aForm[f],onChange:e=>setAForm(g=>({...g,[f]:t==='number'?(parseInt(e.target.value)||0):e.target.value})),placeholder:f==='charge'?'20kg':'',style:{...inp,padding:'8px 8px'}})))
          ),
          h('textarea',{placeholder:'Notes...',value:aForm.notes,onChange:e=>setAForm(f=>({...f,notes:e.target.value})),style:{...inp,height:48,resize:'vertical',marginBottom:12}}),
          h('div',{style:{display:'flex',gap:10,justifyContent:'flex-end'}},
            h('button',{onClick:()=>setAddExoOpen(false),style:{background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:10,padding:'10px 18px',cursor:'pointer'}},'Annuler'),

          )
        )
      );

      // ── Delete confirm modal ──
      const DelProgModal=()=>h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.78)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:16}},
        h('div',{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:28,maxWidth:380,textAlign:'center'}},
          h('div',{style:{fontSize:32,marginBottom:12}},'⚠️'),
          h('div',{style:{fontSize:15,fontWeight:700,color:C.white,marginBottom:8}},'Supprimer ce programme ?'),
          h('div',{style:{fontSize:13,color:C.muted,marginBottom:20}},`"${delProg?.titre}" et tous ses exercices liés seront supprimés.`),
          h('div',{style:{display:'flex',gap:10,justifyContent:'center'}},
            h('button',{onClick:()=>setDelProg(null),style:{background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:10,padding:'10px 20px',cursor:'pointer'}},'Annuler'),
            h('button',{onClick:handleDeleteProg,disabled:saving,style:{...btn,background:`linear-gradient(135deg,${C.red},#c0392b)`,opacity:saving?0.5:1}},saving?'Suppression...':'Supprimer')
          )
        )
      );

        const allWeeks=[...new Set(progExos.map(e=>e.week_number||1))].sort((a,b)=>a-b);

        const DAYS_FR=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

          return h('div',null,

            h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:18,flexWrap:'wrap'}},

                h('div',{style:{fontSize:14,fontWeight:700,color:C.white,marginBottom:10,lineHeight:1.3}},prog.titre),
                h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}},
                  h('span',{style:badge(catColors[prog.categorie]||C.muted)},catLabels[prog.categorie]||prog.categorie),
                  h('span',{style:badge(C.muted)},niveauLabels[prog.niveau]||prog.niveau)
                ),
                h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
                  h('span',{style:{fontSize:12,color:C.muted}},`⏱ ${prog.duree_heures}h`),
                  h('div',null,
                    prog.prix_promo&&h('span',{style:{fontSize:12,color:C.muted,textDecoration:'line-through',marginRight:6}},`${prog.prix}€`),
                    h('span',{style:{fontSize:15,fontWeight:700,color:C.gold}},`${prog.prix_promo||prog.prix}€`)
                  )
                ),
                h('div',{style:{marginTop:10,fontSize:12,color:C.muted}},'👁 Voir les exercices →')
              )
            )
          )
        ),
        // Modals
        createOpen&&h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.78)',display:'flex',alignItems:'flex-start',justifyContent:'center',zIndex:1000,padding:'32px 16px',overflowY:'auto'}},
          h('div',{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:28,width:'100%',maxWidth:540}},
            h('h3',{style:{color:C.white,fontSize:16,fontWeight:700,marginBottom:14}},'Créer un programme'),
            ...pFields(pForm,setPForm),
            h('div',{style:{display:'flex',gap:10,justifyContent:'flex-end',marginTop:10}},
              h('button',{onClick:()=>setCreateOpen(false),style:{background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:10,padding:'10px 18px',cursor:'pointer'}},'Annuler'),
              h('button',{onClick:handleCreate,disabled:saving||!pForm.titre,style:{...btn,opacity:saving||!pForm.titre?0.5:1}},saving?'Création...':'Créer')
            )
          )
        ),
        editProg&&!selectedProg&&h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.78)',display:'flex',alignItems:'flex-start',justifyContent:'center',zIndex:1000,padding:'32px 16px',overflowY:'auto'}},
          h('div',{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:28,width:'100%',maxWidth:540}},
            h('h3',{style:{color:C.white,fontSize:16,fontWeight:700,marginBottom:14}},'Modifier le programme'),
            ...pFields(editProg,setEditProg),
            h('div',{style:{display:'flex',gap:10,justifyContent:'flex-end',marginTop:10}},
              h('button',{onClick:()=>setEditProg(null),style:{background:'transparent',border:`1px solid ${C.border}`,color:C.muted,borderRadius:10,padding:'10px 18px',cursor:'pointer'}},'Annuler'),
              h('button',{onClick:handleEditProg,disabled:saving,style:{...btn,opacity:saving?0.5:1}},saving?'Sauvegarde...':'Enregistrer')
            )
          )
        ),
        delProg&&h(DelProgModal,null)
      );
    }

    // ── Exercices ─────────────────────────────────────────────────────────────
    const ADMIN_EMAILS = ['fumeysarah@yahoo.fr','contact@sergepaulmier.com','contact@tayafitness.com'];
    const EX_MUSCLES = ['Abs','Adductors','Back','Biceps','Calves','Chest','Forearms','Glutes','Hamstrings','Lower Back','Quads','Shoulders','Triceps'];
    const EX_TYPES = ['Bodyweight','Cardio','Cross-training','Stretching'];
    const typeColors = {Bodyweight:C.green,Cardio:C.red,'Cross-training':C.gold,Stretching:C.blue};

    function Exercices() {
      const [exos,setExos] = useState([]);
      const [loading,setLoading] = useState(true);
      const [search,setSearch] = useState('');
      const [muscle,setMuscle] = useState('');
      const [mtype,setMtype] = useState('');
      const [page,setPage] = useState(0);
      const [ytModal,setYtModal] = useState(null);
      const [isAdmin,setIsAdmin] = useState(false);
      // CRUD modals
      const [addOpen,setAddOpen] = useState(false);
      const [editExo,setEditExo] = useState(null);
      const [delExo,setDelExo] = useState(null);
      const [form,setForm] = useState({name:'',youtube_id:'',tags:''});
      const [saving,setSaving] = useState(false);
      const [msg,setMsg] = useState('');

      useEffect(() => {
        sb.auth.getSession().then(({data:{session}}) => {
          if (session?.user) setIsAdmin(ADMIN_EMAILS.includes(session.user.email));
        });
        sb.from('exercises').select('*').order('name').limit(2000)
          .then(({data}) => { setExos(data||[]); setLoading(false); });
      }, []);

      const PER_PAGE = 60;
      const imgUrl = i => i ? 'https://cdn.azeoo.com/exercises/small-wide/'+i : null;

      const filtered = useMemo(() => exos.filter(e => {
        const s = search.toLowerCase();
        const tags = e.tags || [];
        return (!s || e.name.toLowerCase().includes(s))
          && (!muscle || tags.includes(muscle))
          && (!mtype || tags.includes(mtype));
      }), [exos, search, muscle, mtype]);

      const totalPages = Math.ceil(filtered.length / PER_PAGE);
      const visible = filtered.slice(page*PER_PAGE, (page+1)*PER_PAGE);
      const resetPage = () => setPage(0);

      async function handleAdd() {
        setSaving(true);
        const tags = form.tags.split(',').map(t=>t.trim()).filter(Boolean);
        const {data,error} = await sb.from('exercises')
          .insert({name:form.name, youtube_id:form.youtube_id||null, tags})
          .select().single();
        if (!error && data) {
          setExos(prev => [...prev,data].sort((a,b)=>a.name.localeCompare(b.name)));
          setAddOpen(false); setForm({name:'',youtube_id:'',tags:''});
          setMsg('✅ Exercice ajouté');
        } else setMsg('❌ Erreur: '+(error?.message||''));
        setSaving(false); setTimeout(()=>setMsg(''),4000);
      }

      async function handleEdit() {
        setSaving(true);
        const {error} = await sb.from('exercises')
          .update({name:editExo.name, youtube_id:editExo.youtube_id||null})
          .eq('id',editExo.id);
        if (!error) {
          setExos(prev => prev.map(e => e.id===editExo.id ? {...e,...editExo} : e));
          setEditExo(null); setMsg('✅ Exercice mis à jour');
        } else setMsg('❌ Erreur: '+(error?.message||''));
        setSaving(false); setTimeout(()=>setMsg(''),4000);
      }

      async function handleDelete(exo) {
        const {error} = await sb.from('exercises').delete().eq('id',exo.id);
        if (!error) { setExos(prev=>prev.filter(e=>e.id!==exo.id)); setMsg('🗑️ Exercice supprimé'); }
        else setMsg('❌ Erreur: '+(error?.message||''));
        setDelExo(null); setTimeout(()=>setMsg(''),4000);
      }

      const modalBg = {position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000};
      const modalBox = {background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:32,width:480,maxWidth:'90vw'};
      const fldLabel = {fontSize:11,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:C.gold,marginBottom:6,marginTop:16};

      return h('div', null,
        // YouTube modal
        ytModal && h('div', {className:'yt-modal', onClick:()=>setYtModal(null)},
          h('div', {style:{textAlign:'center'}, onClick:e=>e.stopPropagation()},
            h('div', {style:{color:C.white,marginBottom:12,fontSize:16,fontWeight:600}}, ytModal.name),
            h('iframe', {src:`https://www.youtube.com/embed/${ytModal.youtube_id}?autoplay=1`, allow:'autoplay; encrypted-media', allowFullScreen:true}),
            h('button', {onClick:()=>setYtModal(null), style:{marginTop:16,background:C.card,color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 20px',cursor:'pointer'}}, 'Fermer')
          )
        ),

        // Add modal
        addOpen && h('div', {style:modalBg, onClick:()=>setAddOpen(false)},
          h('div', {style:modalBox, onClick:e=>e.stopPropagation()},
            h('h2', {style:{fontSize:18,fontWeight:700,color:C.white,marginBottom:4}}, 'Ajouter un exercice'),
            h('p', {style:{color:C.muted,fontSize:13,marginBottom:8}}, 'Entrez le nom et l\'URL YouTube (optionnel)'),
            h('div', {style:fldLabel}, 'Nom de l\'exercice *'),
            h('input', {style:inp, placeholder:'Ex: Goblet Squat', value:form.name, onChange:e=>setForm(f=>({...f,name:e.target.value}))}),
            h('div', {style:fldLabel}, 'YouTube ID ou URL'),
            h('input', {style:inp, placeholder:'Ex: dGKl7_bK5X4 ou https://youtube.com/watch?v=...', value:form.youtube_id,
              onChange:e=>{
                let v = e.target.value.trim();
                const m = v.match(/(?:v=|youtu\.be\/)([^&\s]{11})/);
                if (m) v = m[1];
                setForm(f=>({...f,youtube_id:v}));
              }
            }),
            h('div', {style:fldLabel}, 'Tags (virgule séparés)'),
            h('input', {style:inp, placeholder:'Ex: Bodyweight, Glutes, Quads, No equipment', value:form.tags, onChange:e=>setForm(f=>({...f,tags:e.target.value}))}),
            h('div', {style:{display:'flex',gap:12,marginTop:24}},
              h('button', {onClick:()=>setAddOpen(false), style:{...btn,background:'transparent',color:C.muted,border:`1px solid ${C.border}`,flex:1}}, 'Annuler'),
              h('button', {onClick:handleAdd, disabled:!form.name||saving, style:{...btn,flex:1,opacity:(!form.name||saving)?0.5:1}}, saving?'Enregistrement...':'Ajouter')
            )
          )
        ),

        // Edit modal
        editExo && h('div', {style:modalBg, onClick:()=>setEditExo(null)},
          h('div', {style:modalBox, onClick:e=>e.stopPropagation()},
            h('h2', {style:{fontSize:18,fontWeight:700,color:C.white,marginBottom:4}}, 'Modifier l\'exercice'),
            h('div', {style:fldLabel}, 'Nom'),
            h('input', {style:inp, value:editExo.name, onChange:e=>setEditExo(x=>({...x,name:e.target.value}))}),
            h('div', {style:fldLabel}, 'YouTube ID (remplacer la vidéo)'),
            h('input', {style:inp, placeholder:'ID YouTube (ex: dGKl7_bK5X4)', value:editExo.youtube_id||'',
              onChange:e=>{
                let v = e.target.value.trim();
                const m = v.match(/(?:v=|youtu\.be\/)([^&\s]{11})/);
                if (m) v = m[1];
                setEditExo(x=>({...x,youtube_id:v||null}));
              }
            }),
            editExo.youtube_id && h('a', {href:`https://www.youtube.com/watch?v=${editExo.youtube_id}`,target:'_blank',style:{display:'block',marginTop:8,color:C.blue,fontSize:12}}, `▶ Voir: youtube.com/watch?v=${editExo.youtube_id}`),
            h('div', {style:{display:'flex',gap:12,marginTop:24}},
              h('button', {onClick:()=>setEditExo(null), style:{...btn,background:'transparent',color:C.muted,border:`1px solid ${C.border}`,flex:1}}, 'Annuler'),
              h('button', {onClick:handleEdit, disabled:saving, style:{...btn,flex:1,opacity:saving?0.5:1}}, saving?'Enregistrement...':'Enregistrer')
            )
          )
        ),

        // Delete confirm
        delExo && h('div', {style:modalBg, onClick:()=>setDelExo(null)},
          h('div', {style:{...modalBox,maxWidth:380}, onClick:e=>e.stopPropagation()},
            h('h2', {style:{fontSize:18,fontWeight:700,color:C.red,marginBottom:12}}, 'Supprimer l\'exercice ?'),
            h('p', {style:{color:C.white,marginBottom:8}}, `"${delExo.name}"`),
            h('p', {style:{color:C.muted,fontSize:13,marginBottom:24}}, 'Cette action est irréversible.'),
            h('div', {style:{display:'flex',gap:12}},
              h('button', {onClick:()=>setDelExo(null), style:{...btn,background:'transparent',color:C.muted,border:`1px solid ${C.border}`,flex:1}}, 'Annuler'),
              h('button', {onClick:()=>handleDelete(delExo), style:{...btn,background:C.red,flex:1}}, 'Supprimer')
            )
          )
        ),

        // Header
        h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}},
          h('div', null,
            h('h1', {style:{fontSize:24,fontWeight:700,color:C.white}}, 'Bibliothèque d\'Exercices'),
            h('p', {style:{color:C.muted,fontSize:14,marginTop:4}},
              loading ? 'Chargement...' : `${filtered.length} exercice(s) · ${exos.length} au total · Supabase`)
          ),
          h('div', {style:{display:'flex',gap:10}},
            isAdmin && h('button', {onClick:()=>setAddOpen(true), style:{...btn,fontSize:13,padding:'10px 18px'}}, '+ Ajouter un exercice'),
            h('a', {href:'https://tayafitness.azeoo.com/exercises', target:'_blank', style:{...btn,background:'transparent',color:C.muted,border:`1px solid ${C.border}`,textDecoration:'none',fontSize:13,padding:'10px 18px'}}, 'Azeoo ↗')
          )
        ),

        // Flash message
        msg && h('div', {style:{background:'rgba(255,255,255,0.07)',border:`1px solid ${C.border}`,borderRadius:10,padding:'10px 16px',marginBottom:16,fontSize:13,color:C.white}}, msg),

        // Filters
        h('div', {style:{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}},
          h('input', {style:{...inp,width:280}, placeholder:'🔍 Rechercher un exercice...', value:search, onChange:e=>{setSearch(e.target.value);resetPage();}}),
          h('select', {style:{...inp,width:180}, value:muscle, onChange:e=>{setMuscle(e.target.value);resetPage();}},
            h('option', {value:''}, 'Tous les muscles'),
            ...EX_MUSCLES.map(m => h('option', {key:m,value:m}, m))
          ),
          h('select', {style:{...inp,width:180}, value:mtype, onChange:e=>{setMtype(e.target.value);resetPage();}},
            h('option', {value:''}, 'Tous les types'),
            ...EX_TYPES.map(t => h('option', {key:t,value:t}, t))
          )
        ),

        // Pagination bar
        h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
          h('p', {style:{color:C.muted,fontSize:13}}, `${visible.length} affichés sur ${filtered.length} · Page ${page+1}/${totalPages||1}`),
          h('div', {style:{display:'flex',gap:8}},
            h('button', {disabled:page===0, onClick:()=>setPage(p=>p-1), style:{background:'transparent',color:page===0?C.border:C.muted,border:`1px solid ${page===0?C.border:C.muted}`,borderRadius:8,padding:'6px 14px',cursor:page===0?'default':'pointer',fontSize:13}}, '← Préc'),
            h('button', {disabled:page>=totalPages-1, onClick:()=>setPage(p=>p+1), style:{background:'transparent',color:page>=totalPages-1?C.border:C.muted,border:`1px solid ${page>=totalPages-1?C.border:C.muted}`,borderRadius:8,padding:'6px 14px',cursor:page>=totalPages-1?'default':'pointer',fontSize:13}}, 'Suiv →')
          )
        ),

        // Cards grid
        loading ? h('p', {style:{color:C.muted}}, 'Chargement des exercices...') :
        h('div', {style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:16}},
          ...visible.map((exo) => {
            const thumb = imgUrl(exo.image_filename);
            const tags = exo.tags || [];
            const muscleTags = tags.filter(t => EX_MUSCLES.includes(t)).slice(0,2);
            const typeTags = tags.filter(t => EX_TYPES.includes(t)).slice(0,1);
            return h('div', {key:exo.id, className:'exo-card',
              style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:'hidden',transition:'transform 0.2s',position:'relative'},
              onClick:()=>exo.youtube_id && setYtModal(exo)},
              // Admin buttons
              isAdmin && h('div', {style:{position:'absolute',top:8,right:8,zIndex:10,display:'flex',gap:4}, onClick:e=>e.stopPropagation()},
                h('button', {onClick:()=>setEditExo(exo), title:'Modifier',
                  style:{background:'rgba(0,0,0,0.7)',color:C.white,border:'none',borderRadius:6,padding:'4px 7px',cursor:'pointer',fontSize:12}}, '✏️'),
                h('button', {onClick:()=>setDelExo(exo), title:'Supprimer',
                  style:{background:'rgba(255,0,0,0.7)',color:C.white,border:'none',borderRadius:6,padding:'4px 7px',cursor:'pointer',fontSize:12}}, '🗑')
              ),
              h('div', {style:{position:'relative',paddingBottom:'60%',background:C.soft}},
                thumb && h('img', {src:thumb, alt:exo.name, style:{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover'}, onError:e=>{e.target.style.display='none'}}),
                exo.youtube_id && h('div', {style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.3)'}},
                  h('div', {style:{width:44,height:44,background:'rgba(255,0,0,0.9)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}},
                    h('span', {style:{marginLeft:3}}, '▶')
                  )
                ),
                !exo.youtube_id && h('a', {href:`https://www.youtube.com/results?search_query=AZEOO+${encodeURIComponent(exo.name)}`,target:'_blank',
                  onClick:e=>e.stopPropagation(),
                  style:{position:'absolute',bottom:8,right:8,background:'rgba(255,0,0,0.85)',color:'#fff',borderRadius:6,padding:'4px 8px',fontSize:10,textDecoration:'none',fontWeight:600}}, 'YT ↗')
              ),
              h('div', {style:{padding:12}},
                h('div', {style:{fontSize:12,fontWeight:600,color:C.white,marginBottom:8,lineHeight:1.3}}, exo.name),
                h('div', {style:{display:'flex',gap:4,flexWrap:'wrap'}},
                  ...typeTags.map(t => h('span', {key:t,style:badge(typeColors[t]||C.muted)}, t)),
                  ...muscleTags.map(m => h('span', {key:m,style:badge(C.muted)}, m))
                )
              )
            );
          })
        )
      );
    }

    // ── Abonnements ──────────────────────────────────────────────────────────
    function Abonnements() {
      const [abos,setAbos]=useState([]);
      const [filter,setFilter]=useState('all');
      const [loading,setLoading]=useState(true);
      useEffect(()=>{
        sb.from('abonnements').select('*,profiles(full_name,email)').order('created_at',{ascending:false})
          .then(({data})=>{setAbos(data||[]);setLoading(false);});
      },[]);
      const filtered=abos.filter(a=>filter==='all'||a.statut===filter);
      const pc={starter:C.blue,performance:C.gold,vip:'#b48cff'};
      const counts={all:abos.length,active:abos.filter(a=>a.statut==='active').length,cancelled:abos.filter(a=>a.statut==='cancelled').length,past_due:abos.filter(a=>a.statut==='past_due').length};
      return h('div',null,
        h('h1',{style:{fontSize:24,fontWeight:700,marginBottom:24,color:C.white}},'Abonnements'),
        h('div',{style:{display:'flex',gap:10,marginBottom:24}},
          ...['all','active','past_due','cancelled'].map((v)=>{
            const labels={all:'Tous',active:'Actifs',past_due:'En retard',cancelled:'Annulés'};
            const colors={all:C.white,active:C.green,past_due:C.gold,cancelled:C.red};
            return h('button',{key:v,onClick:()=>setFilter(v),style:{background:'transparent',color:filter===v?colors[v]:C.muted,border:`1px solid ${filter===v?colors[v]:C.border}`,borderRadius:10,padding:'8px 16px',fontSize:13,cursor:'pointer'}},`${labels[v]} (${counts[v]||0})`);
          })
        ),
        h('div',{style:card},
          loading?h('p',{style:{color:C.muted}},'Chargement...'):
          h('table',{style:{width:'100%',borderCollapse:'collapse'}},
            h('thead',null,h('tr',null,...['Client','Plan','Statut','Renouvellement'].map(l=>h('th',{key:l,style:th},l)))),
            h('tbody',null,...filtered.map((a,i)=>h('tr',{key:i},
              h('td',{style:td},h('div',null,a.profiles?.full_name||'—',h('div',{style:{fontSize:12,color:C.muted}},a.profiles?.email||''))),
              h('td',{style:td},h('span',{style:badge(pc[a.plan]||C.muted)},a.plan)),
              h('td',{style:td},h('span',{style:badge(a.statut==='active'?C.green:a.statut==='past_due'?C.gold:C.red)},a.statut)),
              h('td',{style:{...td,color:C.muted}},a.current_period_end?new Date(a.current_period_end).toLocaleDateString('fr-FR'):'—')
            )))
          )
        )
      );
    }

    // ── Revenus ──────────────────────────────────────────────────────────────
    function Revenus() {
      const [abos,setAbos]=useState([]);
      const [loading,setLoading]=useState(true);
      useEffect(()=>{
        sb.from('abonnements').select('plan,statut').eq('statut','active')
          .then(({data})=>{setAbos(data||[]);setLoading(false);});
      },[]);
      const px={starter:49,performance:99,vip:199};
      const mrr=abos.reduce((s,a)=>s+(px[a.plan]||0),0);
      const cnt={starter:0,performance:0,vip:0};
      abos.forEach(a=>{if(cnt[a.plan]!==undefined)cnt[a.plan]++;});
      return h('div',null,
        h('h1',{style:{fontSize:24,fontWeight:700,marginBottom:24,color:C.white}},'Revenus'),
        loading?h('p',{style:{color:C.muted}},'Chargement...'):h('div',null,
          h('div',{style:{display:'flex',gap:16,marginBottom:32}},
            ...[
              {label:'MRR mensuel',value:`${mrr}€`,color:C.green},
              {label:'ARR annuel projeté',value:`${mrr*12}€`,color:C.blue},
              {label:'Abonnés actifs',value:abos.length,color:C.gold},
            ].map(s=>h('div',{key:s.label,style:{background:C.soft,border:`1px solid ${C.border}`,borderRadius:12,padding:'20px 24px',flex:1}},
              h('div',{style:{fontSize:28,fontWeight:800,color:s.color}},s.value),
              h('div',{style:{fontSize:13,color:C.muted,marginTop:4}},s.label)
            ))
          ),
          h('div',{style:card},
            h('h3',{style:{fontSize:16,fontWeight:600,marginBottom:20,color:C.white}},'Répartition par plan'),
            ...['starter','performance','vip'].map(plan=>h('div',{key:plan,style:{marginBottom:16}},
              h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:6}},
                h('span',{style:{fontSize:14,textTransform:'capitalize',color:C.white}},plan),
                h('span',{style:{fontSize:14,color:C.muted}},`${cnt[plan]} × ${px[plan]}€ = `,h('strong',{style:{color:C.gold}},`${cnt[plan]*px[plan]}€/mois`))
              ),
              h('div',{style:{background:C.border,borderRadius:100,height:6}},
                h('div',{style:{background:C.gold,borderRadius:100,height:6,width:mrr>0?`${cnt[plan]*px[plan]/mrr*100}%`:'0%'}})
              )
            ))
          )
        )
      );
    }

    // ── Emails ───────────────────────────────────────────────────────────────
    function Emails() {
      const [subs,setSubs]=useState([]);
      const [subject,setSubject]=useState('');
      const [body,setBody]=useState('');
      const [sending,setSending]=useState(false);
      const [msg,setMsg]=useState('');
      useEffect(()=>{
        sb.from('newsletter').select('email,created_at').order('created_at',{ascending:false}).then(({data})=>setSubs(data||[]));
      },[]);
      async function send(e){
        e.preventDefault();setSending(true);
        await sb.from('email_log').insert({subject,body,recipients:subs.length,statut:'sent',created_at:new Date().toISOString()});
        setMsg(`Campagne "${subject}" enregistrée — ${subs.length} destinataires`);
        setSubject('');setBody('');setSending(false);
        setTimeout(()=>setMsg(''),5000);
      }
      return h('div',null,
        h('h1',{style:{fontSize:24,fontWeight:700,marginBottom:8,color:C.white}},'Campagnes mail'),
        h('p',{style:{color:C.muted,fontSize:14,marginBottom:24}},`${subs.length} abonnés à la newsletter`),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}},
          h('div',{style:card},
            h('h3',{style:{fontSize:16,fontWeight:600,marginBottom:20,color:C.white}},'Nouvelle campagne'),
            h('form',{onSubmit:send},
              h('div',{style:{marginBottom:16}},
                h('div',{style:{fontSize:11,fontWeight:700,letterSpacing:'0.18em',textTransform:'uppercase',color:C.gold,marginBottom:6}},'Objet'),
                h('input',{style:inp,value:subject,onChange:e=>setSubject(e.target.value),placeholder:'Ex: Nouveaux programmes 🔥',required:true})
              ),
              h('div',{style:{marginBottom:16}},
                h('div',{style:{fontSize:11,fontWeight:700,letterSpacing:'0.18em',textTransform:'uppercase',color:C.gold,marginBottom:6}},'Message'),
                h('textarea',{style:{...inp,resize:'vertical'},rows:8,value:body,onChange:e=>setBody(e.target.value),placeholder:'Bonjour,\n\nÉcris ton message ici...',required:true})
              ),
              msg&&h('div',{style:{color:C.green,fontSize:13,marginBottom:12}},msg),
              h('button',{style:btn,disabled:sending||subs.length===0},sending?'Envoi...':'Envoyer la campagne')
            )
          ),
          h('div',{style:card},
            h('h3',{style:{fontSize:16,fontWeight:600,marginBottom:16,color:C.white}},'Abonnés récents'),
            h('div',{style:{maxHeight:400,overflowY:'auto'}},
              ...subs.slice(0,30).map((s,i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:`1px solid ${C.border}`,fontSize:13}},
                h('span',{style:{color:C.white}},s.email),
                h('span',{style:{color:C.muted}},new Date(s.created_at).toLocaleDateString('fr-FR'))
              )),
              subs.length===0&&h('p',{style:{color:C.muted,fontSize:14}},'Aucun abonné.')
            )
          )
        )
      );
    }

    // ── Tâches ───────────────────────────────────────────────────────────────
    function Taches() {
      const [taches,setTaches]=useState([]);
      const [titre,setTitre]=useState('');
      const [prio,setPrio]=useState('normale');
      useEffect(()=>{load();}, []);
      async function load(){const {data}=await sb.from('taches').select('*').order('created_at',{ascending:false});setTaches(data||[]);}
      async function add(e){e.preventDefault();if(!titre.trim())return;await sb.from('taches').insert({titre,statut:'todo',priorite:prio});setTitre('');load();}
      async function toggle(id,done){await sb.from('taches').update({statut:done?'todo':'done'}).eq('id',id);load();}
      async function del(id){await sb.from('taches').delete().eq('id',id);load();}
      const pc={haute:C.red,normale:C.gold,basse:C.blue};
      const todo=taches.filter(t=>t.statut!=='done');
      const done=taches.filter(t=>t.statut==='done');
      return h('div',null,
        h('h1',{style:{fontSize:24,fontWeight:700,marginBottom:24,color:C.white}},'Tâches'),
        h('div',{style:{...card,marginBottom:24}},
          h('form',{onSubmit:add,style:{display:'flex',gap:12}},
            h('input',{style:{...inp,flex:1},value:titre,onChange:e=>setTitre(e.target.value),placeholder:'Nouvelle tâche...'}),
            h('select',{style:{...inp,width:140},value:prio,onChange:e=>setPrio(e.target.value)},
              h('option',{value:'haute'},'🔴 Haute'),
              h('option',{value:'normale'},'🟡 Normale'),
              h('option',{value:'basse'},'🔵 Basse')
            ),
            h('button',{style:btn},'Ajouter')
          )
        ),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}},
          h('div',{style:card},
            h('h3',{style:{fontSize:15,fontWeight:600,marginBottom:16,color:C.white}},`À faire (${todo.length})`),
            todo.length===0?h('p',{style:{color:C.muted,fontSize:14}},'Tout est fait 🎉'):
            todo.map((t,i)=>h('div',{key:i,style:{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:`1px solid ${C.border}`}},
              h('button',{onClick:()=>toggle(t.id,false),style:{width:20,height:20,borderRadius:4,border:`2px solid ${C.border}`,background:'transparent',cursor:'pointer',flexShrink:0}}),
              h('span',{style:{flex:1,fontSize:14,color:C.white}},t.titre),
              h('span',{style:badge(pc[t.priorite]||C.muted)},t.priorite),
              h('button',{onClick:()=>del(t.id),style:{background:'transparent',border:'none',color:C.muted,cursor:'pointer',fontSize:16}},'✕')
            ))
          ),
          h('div',{style:card},
            h('h3',{style:{fontSize:15,fontWeight:600,marginBottom:16,color:C.white}},`Terminées (${done.length})`),
            done.length===0?h('p',{style:{color:C.muted,fontSize:14}},'Aucune tâche terminée.'):
            done.map((t,i)=>h('div',{key:i,style:{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:`1px solid ${C.border}`}},
              h('button',{onClick:()=>toggle(t.id,true),style:{width:20,height:20,borderRadius:4,border:'none',background:C.green,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#fff'}},'✓'),
              h('span',{style:{flex:1,fontSize:14,textDecoration:'line-through',color:C.muted}},t.titre),
              h('button',{onClick:()=>del(t.id),style:{background:'transparent',border:'none',color:C.muted,cursor:'pointer',fontSize:16}},'✕')
            ))
          )
        )
      );
    }

    createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
